<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Luz Accesorios — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --cr:#FDFAF7;--dk:#2A1C10;--lu:#C4A882;--lu2:#B8956A;--lu3:#F5EDE0;--lu4:#FAF5EE;
  --mid:#8B7355;--warm:#A67C52;--bd:#E8DDD0;--bd2:#C4A882;
  --ok:#4A7C59;--err:#C0392B;--sh:0 2px 20px rgba(42,28,16,.08);
  --r:8px;--r2:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cr);color:var(--dk);font-family:'Nunito',sans-serif;min-height:100vh}

/* HEADER */
.hdr{background:var(--dk);padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.hdr-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;gap:16px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-txt{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--lu);letter-spacing:2px}
.logo-sub{font-size:9px;color:var(--mid);letter-spacing:3px;text-transform:uppercase;margin-top:-2px}
.hdr-badge{background:var(--lu);color:var(--dk);font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:1px;text-transform:uppercase}

/* HERO */
.hero{background:linear-gradient(135deg,var(--dk) 0%,#3D2B1A 100%);padding:60px 24px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C4A882' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,6vw,3.5rem);color:#fff;font-weight:300;letter-spacing:3px;position:relative}
.hero h1 span{color:var(--lu);font-style:italic}
.hero p{color:var(--mid);font-size:.95rem;margin-top:10px;letter-spacing:1px;position:relative}
.hero-line{width:60px;height:1px;background:var(--lu);margin:20px auto;position:relative}

/* FILTERS */
.filters{background:#fff;border-bottom:1px solid var(--bd);padding:14px 24px;position:sticky;top:64px;z-index:99}
.filters-inner{max-width:1200px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fpill{padding:6px 16px;border:1.5px solid var(--bd);border-radius:20px;background:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:var(--mid);cursor:pointer;transition:all .2s;letter-spacing:.5px}
.fpill:hover,.fpill.on{background:#8B6F5E;border-color:#8B6F5E;color:#fff}
.search-wrap{margin-left:auto;position:relative}
.search-input{padding:7px 14px 7px 34px;border:1.5px solid var(--bd);border-radius:20px;background:var(--lu4);font-family:'Nunito',sans-serif;font-size:12px;outline:none;width:200px;transition:border-color .2s}
.search-input:focus{border-color:var(--lu2)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mid);font-size:14px;pointer-events:none}

/* GRID */
.main{max-width:1200px;margin:0 auto;padding:32px 24px}
.count{font-size:12px;color:var(--mid);margin-bottom:20px;letter-spacing:.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}

/* CARD */
.card{background:#fff;border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(42,28,16,.15)}
.card-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--lu3);display:flex;align-items:center;justify-content:center}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img-ph{width:100%;aspect-ratio:1;background:linear-gradient(135deg,var(--lu3),var(--lu4));display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--bd2)}
.card-body{padding:14px}
.card-cat{font-size:9px;color:var(--mid);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:4px}
.card-nom{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--dk);font-weight:600;margin-bottom:2px;line-height:1.3}
.card-cod{font-size:9px;color:var(--bd2);font-family:monospace;margin-bottom:8px}
.card-desc{font-size:10px;color:var(--mid);margin-bottom:10px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-pv{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--lu2);font-weight:600}
.card-stock{font-size:9px;padding:3px 8px;border-radius:10px;font-weight:700}
.stock-ok{background:#E8F5E9;color:#2E7D32}
.stock-bajo{background:#FFF3E0;color:#E65100}
.btn-pedir{width:100%;margin-top:10px;padding:9px;background:var(--dk);color:var(--lu);border:none;border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:background .2s;text-transform:uppercase}
.btn-pedir:hover{background:#3D2B1A}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:var(--r2);max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--lu3)}
.modal-img-ph{width:100%;aspect-ratio:1;background:linear-gradient(135deg,var(--lu3),var(--lu4));display:flex;align-items:center;justify-content:center;font-size:4rem;color:var(--bd2)}
.modal-body{padding:20px}
.modal-cat{font-size:10px;color:var(--mid);letter-spacing:2px;text-transform:uppercase;font-weight:600}
.modal-nom{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--dk);margin:4px 0 2px}
.modal-cod{font-size:10px;color:var(--bd2);font-family:monospace;margin-bottom:12px}
.modal-desc{font-size:12px;color:var(--mid);line-height:1.6;margin-bottom:16px;padding:10px;background:var(--lu4);border-radius:var(--r)}
.modal-pv{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--lu2);font-weight:600;margin-bottom:16px}
.modal-btns{display:flex;gap:10px}
.btn-wa{flex:1;padding:12px;background:#25D366;color:#fff;border:none;border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s}
.btn-wa:hover{background:#128C7E}
.btn-close{padding:12px 16px;background:var(--lu4);color:var(--mid);border:none;border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:13px;cursor:pointer}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--mid)}
.empty-ico{font-size:3rem;margin-bottom:12px}

/* FOOTER */
.footer{text-align:center;padding:40px 24px;color:var(--mid);font-size:11px;border-top:1px solid var(--bd);margin-top:40px}
.footer a{color:var(--lu2);text-decoration:none}

/* Loading */
.loading{text-align:center;padding:80px;color:var(--mid)}
.spinner{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--lu);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .search-wrap{margin-left:0;width:100%}
  .search-input{width:100%}
  .filters-inner{gap:6px}
  .hero{padding:40px 16px}
}
</style>
</head>

<script>
const SHEET_ID='1MBFGK_OsqGjqC2kVea6vasq0D1Hc-aiXHlt1xT5lnHI';
const API_KEY='AIzaSyCI89kCwt-PUf6UVRmqSLXmtdRpDZGzlfA';
const WA_NUM='573052071061';
const CATS=['ARETES','CADENAS','PULSERAS','ANILLOS','EAR CUFF','SET','GARGANTILLAS','JOYEROS','OTROS'];

var PRODS=[];
var filtCat='';

function COP(n){return '$'+Math.round(n).toLocaleString('es-CO');}

async function sheetGet(range){
  var url='https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent(range)+'?key='+API_KEY;
  var r=await fetch(url);
  var d=await r.json();
  return d.values||[];
}

async function cargar(){
  try{
    // Load inventory
    var invR=await sheetGet('INVENTARIO!A2:S');
    var refR=await sheetGet('REFERENCIAS!A2:F');
    
    // Build image map from REFERENCIAS
    var imgMap={};
    refR.forEach(function(r){
      var cod=String(r[1]||r[0]||'').trim();
      var img=String(r[3]||r[2]||'').trim();
      if(cod&&img&&img.includes('drive.google.com')){
        var m=img.match(/\/d\/([^/?]+)/)||img.match(/id=([^&]+)/);
        if(m)img='https://drive.google.com/thumbnail?id='+m[1]+'&sz=w400';
        imgMap[cod]=img;
      } else if(cod&&img&&img.startsWith('http')){
        imgMap[cod]=img;
      }
    });

    // Parse products with stock
    PRODS=[];
    invR.forEach(function(r){
      var cod=String(r[1]||'').trim();
      var nom=String(r[4]||'').trim();
      if(!cod||!nom)return;
      var cat=String(r[3]||'').trim();
      var pv=parseFloat(String(r[11]||'').replace(/[$, ]/g,''))||0;
      var sa=parseFloat(String(r[18]||'').replace(/[$, ]/g,''))||0;
      var desc=String(r[15]||'').trim();
      if(sa<=0||!pv)return; // Solo con stock y precio
      PRODS.push({cod:cod,nom:nom,cat:cat,pv:pv,sa:Math.round(sa),desc:desc,img:imgMap[cod]||''});
    });

    // Build category pills
    var cats=[...new Set(PRODS.map(function(p){return p.cat;}))].filter(Boolean).sort();
    var pillsEl=document.getElementById('cat-pills');
    var searchWrap=pillsEl.querySelector('.search-wrap');
    cats.forEach(function(c){
      var btn=document.createElement('button');
      btn.className='fpill';
      btn.textContent=c;
      btn.onclick=function(){setFiltro(c);};
      pillsEl.insertBefore(btn,searchWrap);
    });

    renderCatalogo();
  }catch(e){
    document.getElementById('grid').innerHTML='<div class="loading" style="grid-column:1/-1"><div class="empty-ico">⚠️</div><div>Error cargando productos</div></div>';
  }
}

function setFiltro(cat){
  filtCat=cat;
  document.querySelectorAll('.fpill').forEach(function(b){
    b.classList.toggle('on', b.textContent===cat||(cat===''&&b.textContent==='Todas'));
  });
  renderCatalogo();
}

function renderCatalogo(){
  var q=(document.getElementById('buscador')?.value||'').toLowerCase();
  var pp=PRODS.filter(function(p){
    if(filtCat&&p.cat!==filtCat)return false;
    if(q&&!p.nom.toLowerCase().includes(q)&&!p.cod.toLowerCase().includes(q))return false;
    return true;
  });
  
  document.getElementById('count-txt').textContent=pp.length+' referencias disponibles';
  
  if(!pp.length){
    document.getElementById('grid').innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-ico">💍</div><div>No hay referencias disponibles</div></div>';
    return;
  }

  document.getElementById('grid').innerHTML=pp.map(function(p){
    var imgHtml=p.img?
      '<div class="card-img"><img src="'+p.img+'" alt="'+p.nom+'" loading="lazy" onerror="this.parentNode.innerHTML=\'<div class=card-img-ph>💍</div>\'"></div>':
      '<div class="card-img-ph">💍</div>';
    var stockEl=p.sa>2?
      '<span class="card-stock stock-ok">Disponible</span>':
      '<span class="card-stock stock-bajo">Últimas '+p.sa+'</span>';
    return '<div class="card" onclick="verDetalle(\''+p.cod+'\')">'+
      imgHtml+
      '<div class="card-body">'+
        '<div class="card-cat">'+p.cat+'</div>'+
        '<div class="card-nom">'+p.nom+'</div>'+
        '<div class="card-cod">'+p.cod+'</div>'+
        (p.desc?'<div class="card-desc">'+p.desc+'</div>':'')+
        '<div class="card-footer">'+
          '<div class="card-pv">'+COP(p.pv)+'</div>'+
          stockEl+
        '</div>'+
        '<button class="btn-pedir" onclick="event.stopPropagation();pedirWA(\''+p.cod+'\')">Pedir por WhatsApp</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function verDetalle(cod){
  var p=PRODS.find(function(x){return x.cod===cod;});
  if(!p)return;
  var bg=document.createElement('div');
  bg.className='modal-bg';
  var imgHtml=p.img?
    '<img class="modal-img" src="'+p.img+'" alt="'+p.nom+'" onerror="this.outerHTML=\'<div class=modal-img-ph>💍</div>\'">':
    '<div class="modal-img-ph">💍</div>';
  var stockTxt=p.sa>2?'Disponible':'Últimas '+p.sa+' unidades';
  bg.innerHTML='<div class="modal">'+
    imgHtml+
    '<div class="modal-body">'+
      '<div class="modal-cat">'+p.cat+' · '+p.cod+'</div>'+
      '<div class="modal-nom">'+p.nom+'</div>'+
      (p.desc?'<div class="modal-desc">'+p.desc+'</div>':'')+
      '<div class="modal-pv">'+COP(p.pv)+'</div>'+
      '<div style="font-size:11px;color:var(--mid);margin-bottom:16px">'+stockTxt+'</div>'+
      '<div class="modal-btns">'+
        '<button class="btn-close" onclick="this.closest(\'.modal-bg\').remove()">← Volver</button>'+
        '<button class="btn-wa" onclick="pedirWA(\''+p.cod+'\')">'+
          '<span>📱</span> Pedir por WhatsApp'+
        '</button>'+
      '</div>'+
    '</div>'+
  '</div>';
  bg.onclick=function(e){if(e.target===bg)bg.remove();};
  document.body.appendChild(bg);
}

function pedirWA(cod){
  var p=PRODS.find(function(x){return x.cod===cod;});
  if(!p)return;
  var msg='Hola Luz Accesorios! 💍 Me gustaría pedir:\n\n'+
    '*'+p.nom+'*\n'+
    'Código: '+p.cod+'\n'+
    'Precio: '+COP(p.pv)+'\n\n'+
    '¿Está disponible?';
  window.open('https://wa.me/'+WA_NUM+'?text='+encodeURIComponent(msg),'_blank');
}

cargar();
</script>
