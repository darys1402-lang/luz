<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Luz Accesorios</title><!-- v045048 --><link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet"><style>
:root{--lu:#C4A882;--lu2:#D8BC9A;--lu3:#F5EDE0;--lu4:#FAF6F0;--cr:#FFFCF8;--dk:#3A2A18;--mid:#5C4430;--warm:#8A7060;--ok:#4A7A38;--ok2:#EAF2E0;--err:#9A3030;--err2:#FCE8E8;--info:#2A5280;--info2:#E4EDF8;--bd:rgba(196,168,130,.2);--bd2:rgba(196,168,130,.4);--r:9px;--r2:14px;--sh:0 2px 8px rgba(58,42,24,.06)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:sans-serif;font-size:14px;background:var(--lu4);color:var(--dk);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
/* BANNER BLANCO */
.banner{background:#fff;border-bottom:1px solid var(--lu3);height:62px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 6px rgba(196,168,130,.1)}
.blogo{display:flex;align-items:center;gap:8px}
.b-r{display:flex;align-items:center;gap:14px}
.bst b{display:block;font-size:13px;font-weight:700;color:var(--lu)}
.bst small{font-size:9px;color:var(--warm);letter-spacing:1px;text-transform:uppercase;display:block}
.bsync{background:var(--lu3);border:1.5px solid var(--lu2);border-radius:20px;color:var(--mid);padding:5px 13px;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;font-family:sans-serif;transition:all .2s}
.bsync:hover{background:var(--lu);color:#fff}
/* NAV BLANCO */
.nav{background:#fff;display:flex;overflow-x:auto;flex-shrink:0;border-bottom:1.5px solid var(--lu3);scrollbar-width:none;padding:0 6px}
.nav::-webkit-scrollbar{display:none}
.ebtn{font-size:9px;padding:1px 4px;border:1px solid var(--bd2);border-radius:3px;background:var(--lu3);cursor:pointer;color:var(--mid)}.ebtn:hover{background:var(--lu2);color:var(--dk)}
.nb{background:none;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;color:var(--warm);font-family:sans-serif;font-size:10px;cursor:pointer;transition:color .15s,background .15s;letter-spacing:.8px;text-transform:uppercase;font-weight:700;padding:10px 12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.nb:hover{color:#8B6F5E;background:rgba(139,111,94,.06)}.nb.on{color:#8B6F5E;border-bottom-color:#8B6F5E}
/* CONTENT */
.ct{flex:1;overflow:auto;padding:14px;background:var(--lu4)}
.pane{display:none}.pane.on{display:block;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
/* SPLASH */
#spl{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .35s}
#spl.h{opacity:0;pointer-events:none}
.sp-w{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.sp-t{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--warm);margin-bottom:22px}
.spn{width:22px;height:22px;border:2px solid var(--lu3);border-top-color:var(--lu);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* TOAST */
#tst{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--dk);color:var(--lu);padding:9px 20px;border-radius:20px;font-size:11px;font-weight:700;opacity:0;transition:all .25s;pointer-events:none;z-index:999;border:1px solid var(--lu);white-space:nowrap}
#tst.sh{opacity:1;transform:translateX(-50%) translateY(0)}
/* CARDS */
.card{background:var(--cr);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:11px;box-shadow:var(--sh)}
.ctit{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--dk);margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;gap:8px}
/* KPIs */
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px;margin-bottom:12px}
.kc{background:var(--cr);border:1px solid var(--bd);border-radius:var(--r2);padding:13px;position:relative;overflow:hidden;box-shadow:var(--sh);transition:background .15s}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:var(--lu)}
.kc.ok::before{background:var(--ok)}.kc.err::before{background:var(--err)}.kc.info::before{background:var(--info)}
.kl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--warm);margin-bottom:5px;font-weight:700}
.kv{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--lu)}
.kv.ok{color:var(--ok)}.kv.err{color:var(--err)}.kv.info{color:var(--info)}
.ks{font-size:10px;color:var(--warm);margin-top:3px}
/* LAYOUT */
.two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
/* FORMS */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.fg label{font-size:10px;color:var(--mid);letter-spacing:.5px;font-weight:700;text-transform:uppercase}
.fg input,.fg select,.fg textarea{padding:8px 11px;border:1.5px solid var(--bd2);border-radius:var(--r);background:var(--lu4);color:var(--dk);font-family:sans-serif;font-size:13px;width:100%;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--lu);background:var(--cr)}
.fg input[readonly]{background:var(--lu3);color:var(--warm)}
.fg textarea{resize:vertical;min-height:80px}
/* BUTTONS */
.btn{padding:8px 16px;border-radius:20px;border:1.5px solid var(--bd2);background:var(--cr);color:var(--dk);font-family:sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--lu3)}.btn-lu{background:var(--lu);color:#fff;border-color:var(--lu)}.btn-lu:hover{background:var(--lu2);color:var(--dk)}
.btn-sm{padding:4px 12px;font-size:10px}.btn-gh{background:none;border-color:transparent;color:var(--warm)}
.brow{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:8px 9px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--warm);border-bottom:1.5px solid var(--bd2);font-weight:700;background:var(--lu3);white-space:nowrap}
td{padding:8px 9px;border-bottom:1px solid var(--bd);color:var(--warm);vertical-align:middle}
tr:hover td{background:var(--lu3)}.inv-row:hover{background:var(--lu3);cursor:pointer}.cc:hover{background:var(--lu3);transition:background .15s}.kc:hover{background:var(--lu3);transition:background .15s}.tdm{color:var(--dk);font-weight:600}
/* PILLS/BADGES */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;white-space:nowrap}
.p-ok{background:var(--ok2);color:var(--ok)}.p-err{background:var(--err2);color:var(--err)}
.p-lu{background:var(--lu3);color:var(--mid)}.p-info{background:var(--info2);color:var(--info)}
.p-warn{background:#FEF3E2;color:#7A5A10}
/* FILTER PILLS */
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.fpill{background:none;border:1.5px solid var(--bd2);border-radius:20px;padding:3px 11px;font-size:10px;font-weight:700;cursor:pointer;font-family:sans-serif;color:var(--warm);transition:all .12s}
.fpill:hover,.fpill.on{background:#8B6F5E;border-color:#8B6F5E;color:#fff}
/* CHART BARS */
.bch{display:flex;align-items:flex-end;gap:4px}
.bc{display:flex;flex-direction:column;align-items:center;flex:1}
.bf{width:100%;background:linear-gradient(180deg,var(--lu2),var(--lu));border-radius:4px 4px 0 0;min-height:2px}
.bf.ok{background:linear-gradient(180deg,#90C878,var(--ok))}.bf.neg{background:#C8B8A8}
.bl{font-size:8px;color:var(--warm);margin-top:3px;font-weight:600}
/* SEARCH BAR */
.sb input{width:100%;margin-bottom:10px;padding:9px 13px;border:1.5px solid var(--bd2);border-radius:20px;background:var(--cr);color:var(--dk);font-family:sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.sb input:focus{border-color:var(--lu)}
/* INVENTARIO LISTA */
.inv-tbl{background:var(--cr);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh)}
.inv-row{display:grid;grid-template-columns:78px 1fr 70px 46px 80px 88px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.inv-row:hover{background:var(--lu3)}.inv-row>div{padding:8px 7px;font-size:11px;color:var(--warm)}
.inv-row>.n{color:var(--dk);font-weight:600}.inv-head>div{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:var(--lu3)}
/* CARTERA */
.cc{background:var(--cr);border:1px solid var(--bd);border-left:3px solid var(--lu);border-radius:var(--r2);padding:12px 14px;margin-bottom:9px}
/* CALC */
.cbox{background:var(--lu4);border:1.5px solid var(--bd);border-radius:var(--r);padding:12px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);font-size:11px}
.crow:last-child{border-bottom:none;padding-top:7px;font-size:13px;font-weight:600}
.crow.hi{color:var(--lu);font-weight:600}.crow.ok{color:var(--ok)}.crow.err{color:var(--err)}
.cl{color:var(--warm)}.dv{height:1px;background:var(--bd2);margin:6px 0}
/* METAS BAR */
.mb-bg{width:100%;height:9px;background:var(--lu3);border-radius:5px;overflow:hidden;margin:6px 0 3px}
.mb-fl{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--lu),var(--lu2));transition:width .4s}
/* BAR CHART ROWS */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:10px;color:var(--warm);width:80px;flex-shrink:0;font-weight:600;text-transform:capitalize;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-bg{flex:1;height:6px;background:var(--lu3);border-radius:3px;overflow:hidden}
.bar-fl{height:100%;border-radius:3px}
.bar-val{font-size:10px;font-weight:700;min-width:85px;text-align:right}
/* TABS */
.its{display:flex;border-bottom:1.5px solid var(--bd);margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.its::-webkit-scrollbar{display:none}
.it{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1.5px;padding:7px 13px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;color:var(--warm);font-family:sans-serif;font-weight:700;white-space:nowrap}
.it.on{color:#8B6F5E;border-bottom-color:#8B6F5E}
.ip{display:none}.ip.on{display:block}
/* NOTA */
.nota{background:var(--lu3);border:1px solid var(--bd2);border-radius:var(--r);padding:9px 13px;font-size:11px;color:var(--mid);margin-bottom:11px;line-height:1.6;font-weight:500}
.nota strong{color:var(--dk)}.nota.info{background:var(--info2);border-color:var(--info);color:var(--info)}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(58,42,24,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(2px)}
.ov.sh{display:flex}
.mo{background:var(--cr);border-radius:var(--r2);width:100%;max-width:460px;max-height:88vh;overflow:auto;border:1px solid var(--bd)}
.mh{padding:13px 16px 11px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mh h3{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--dk)}
.mb2{padding:14px 16px}.mf{padding:11px 16px;border-top:1px solid var(--bd);display:flex;gap:7px;justify-content:flex-end}
.xb{background:none;border:none;font-size:18px;cursor:pointer;color:var(--warm)}
/* EMPTY */
.emp{text-align:center;padding:24px;color:var(--warm);font-size:11px}
.emp-ico{font-size:26px;margin-bottom:6px;opacity:.4}
/* DROPDOWN BUSQUEDA */
.sg{display:none;position:absolute;top:100%;left:0;right:0;background:var(--cr);border:1.5px solid var(--bd2);border-radius:var(--r);z-index:50;max-height:160px;overflow:auto;box-shadow:var(--sh)}
.sg.sh{display:block}
.si{padding:8px 11px;cursor:pointer;font-size:11px;border-bottom:1px solid var(--bd);font-weight:500}
.si:hover{background:var(--lu3)}
@media(max-width:600px){.two{grid-template-columns:1fr}.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}.kg{grid-template-columns:1fr 1fr}.ct{padding:10px}.banner{height:54px;padding:0 10px}.b-r .bst:first-child{display:none}.inv-row{grid-template-columns:60px 1fr 55px 75px 70px}}

function filtrarCart(){
  if(AÑO_FIL==='todos')return DB.cart;

let CODES={LAR:0,LC:0,LP:0,LAN:0,LEAR:0,LS:0,LG:0,LJ:0,LO:0};
function recalcCodes(){
  Object.keys(CODES).forEach(function(pref){CODES[pref]=0;});
  DB.prods.forEach(function(p){
    var cod=String(p.cod||'').toUpperCase();
    Object.keys(CODES).forEach(function(pref){
      if(cod.startsWith(pref)){
        var n=parseInt(cod.slice(pref.length))||0;
        if(n>CODES[pref])CODES[pref]=n;
      }
    });
  });
}

function cargaListaCol(){
  var txt=(document.getElementById('col-bulk')?.value||'').trim();
  if(!txt){toast('Pega tu lista primero',1);return;}
  var p=getColParams();
  var ok=0,err=0;
  var CATS_ALL=['ARETES','CADENAS','PULSERAS','ANILLOS','EAR CUFF','SET','GARGANTILLAS','JOYEROS','OTROS'];
  txt.split('\n').filter(function(l){return l.trim();}).forEach(function(l){
    var parts=l.split(',').map(function(x){return x.trim();});
    if(parts.length<3){err++;return;}
    var nom=parts[0].trim();
    // Detect if second part is a category or a price
    var catR=(parts[1]||'').toUpperCase().trim();
    var isCat=CATS_ALL.includes(catR);
    var cat,cuStr,saStr;
    if(isCat&&parts.length>=4){
      cat=catR;
      cuStr=parts[2];
      saStr=parts[3];
    } else if(isCat&&parts.length===3){
      cat=catR;
      cuStr=parts[2];
      saStr='0';
    } else {
      // No category provided - guess from name or default OTROS
      cat='OTROS';
      cuStr=parts[1];
      saStr=parts[2]||'0';
    }
    // Clean currency: remove $, spaces, dots used as thousands separator
    var cu=parseFloat((cuStr||'').replace(/[$\s]/g,'').replace(/\./g,'').replace(/,/g,'.'))||0;
    var sa=parseFloat((saStr||'').replace(/[$\s]/g,'').replace(/\./g,''))||0;
    if(!nom||!cu){err++;return;}
    var pref=PREFS[cat]||'LO';
    CODES[pref]=(CODES[pref]||0)+1;
    var cod=pref+String(CODES[pref]).padStart(3,'0');
    // Ensure no duplicate
    while(DB.prods.find(function(x){return x.cod===cod;})){
      CODES[pref]++;
      cod=pref+String(CODES[pref]).padStart(3,'0');
    }
    var calc=calcPrecioCol(cu,p);
    var colNom2=document.getElementById('col-nombre')?.value||'';
    COLECCION.push({cod:cod,nom:nom,cat:cat,cu:cu,sa:sa,pv:calc.sug,pvMin:calc.cTotal,calc:calc,img:'',imgRaw:'',col:colNom2});
    ok++;
  });
  if(ok){
    document.getElementById('col-bulk').value='';
    renderTablaCol();
    toast(ok+' referencias cargadas'+(err?' ('+err+' con error de formato)':''));
  } else {
    toast('Verifica el formato: NOMBRE, CATEGORIA, COSTO, STOCK',1);
  }
}

async function sheetGet(range){
  const url=BASE+encodeURIComponent(range)+'?key='+API_KEY;
  const r=await fetch(url);
  if(!r.ok){
    const d=await r.json();
    throw new Error(d.error?.message||'Error 400: '+range);
  }
  const d=await r.json();
  return d.values||[];
}

  const b=document.getElementById('bsy');b.textContent='Cargando...';b.disabled=true;
  try{
    const invR=await sheetGet('INVENTARIO!A2:S').catch(e=>{console.warn('INVENTARIO:',e.message);return[];});
    const ventR=await sheetGet('VENTAS!A2:L').catch(e=>{console.warn('VENTAS:',e.message);return[];});
    const gastR=await sheetGet('GASTOS!A2:E').catch(e=>{console.warn('GASTOS:',e.message);return[];});
    const pedR=await sheetGet('PEDIDOS!A2:G').catch(e=>{console.warn('PEDIDOS:',e.message);return[];});
    DB.prods=[];
    CODES={LAR:0,LC:0,LP:0,LAN:0,LEAR:0,LS:0,LG:0,LJ:0,LO:0};
    invR.forEach(function(r,rowIdx){
      const cod=String(r[1]||'').trim(),nom=String(r[4]||'').trim();
      if(!cod||!nom)return;
      const cat=String(r[3]||'').trim();
      const cu=Math.round(parseFloat(String(r[8]||r[5]||'').replace(/[$, ]/g,''))||0);
      const pv=Math.round(parseFloat(String(r[11]||'').replace(/[$, ]/g,''))||0);
      const sa=Math.round(parseFloat(String(r[18]||'').replace(/[$, ]/g,''))||0);
      DB.prods.push({cod:cod,cat:cat,nom:nom,cu:cu,pv:pv,sa:sa,img:'',col:'',desc:'',rowIdx:rowIdx});
      Object.values(PREFS).forEach(function(pref){if(cod.toUpperCase().startsWith(pref)){const n=parseInt(cod.replace(/\D/g,''))||0;if(n>CODES[pref])CODES[pref]=n;}});
    });
    const anaMap={},cartMap={};
    ventR.forEach(function(r){
      var mes=String(r[1]||'').trim().toLowerCase();
      var cli=String(r[2]||'').trim(),ref=String(r[4]||'').trim();
      // Parse price: handles "$ 18,000" or "18000" or "$18,000"
      var pvRaw=String(r[5]||'').replace(/[$\s]/g,'').replace(/,/g,'');
      var pv=parseFloat(pvRaw)||0;
      var salRaw=String(r[10]||'').replace(/[$\s]/g,'').replace(/,/g,'').replace(/-/g,'0');
      var sal=parseFloat(salRaw)||0;
      var fRaw=String(r[0]||''),año='';
      // Handle "3/4/2025" format (d/m/yyyy)
      if(fRaw.includes('/')){
        var parts=fRaw.split('/');
        if(parts.length===3){
          año=parts[2].length===4?parts[2]:('20'+parts[2]);
          if(!mes)mes=MES_S[parseInt(parts[1])-1]||'';
        }
      } else if(!isNaN(parseFloat(fRaw))&&parseFloat(fRaw)>40000){
        var d=new Date((parseFloat(fRaw)-25569)*86400000);
        año=String(d.getFullYear());
        if(!mes)mes=MES_S[d.getMonth()];
      } else {
        año=fRaw.slice(0,4);
      }
      if(!mes||!pv)return;
      const key=año+'_'+mes;
      if(!anaMap[key])anaMap[key]={año:año,mes:mes,ventas:0,gastos:0};
      anaMap[key].ventas+=pv;
      if(sal>0&&cli){
        if(!cartMap[cli])cartMap[cli]={cli:cli,total:0,items:[]};
        cartMap[cli].total+=sal;
        cartMap[cli].items.push({p:ref,f:fRaw.slice(0,10),s:sal});
      }
    });
    DB.gastos=[];
    gastR.forEach(function(r){
      var mes=String(r[1]||'').trim().toLowerCase();
      var valRaw=String(r[3]||'').replace(/[$ ]/g,'').replace(/,/g,'').replace(/-/g,'');
      var val=parseFloat(valRaw)||0;
      var fRaw=String(r[0]||''),año='';
      if(fRaw.includes('/')){
        var parts=fRaw.split('/');
        if(parts.length===3) año=parts[2].length===4?parts[2]:('20'+parts[2]);
      } else if(!isNaN(parseFloat(fRaw))&&parseFloat(fRaw)>40000){
        var d=new Date((parseFloat(fRaw)-25569)*86400000);
        año=String(d.getFullYear());
        if(!mes)mes=MES_S[d.getMonth()];
      } else {año=fRaw.slice(0,4);}
      if(!mes||val<=0)return;
      const key=año+'_'+mes;
      if(!anaMap[key])anaMap[key]={año:año,mes:mes,ventas:0,gastos:0};
      anaMap[key].gastos+=val;
      DB.gastos.push({f:fRaw.slice(0,10),mes:mes,cat:String(r[2]||'').trim(),dsc:String(r[2]||'').trim(),val:val});
    });
    const ORDEN=MES_S;
    DB.ana=Object.values(anaMap).filter(function(x){return x.ventas>0;}).sort(function(a,b){if(a.año!==b.año)return a.año.localeCompare(b.año);return ORDEN.indexOf(a.mes)-ORDEN.indexOf(b.mes);});
    DB.ana.forEach(function(x){x.costos=Math.round(x.ventas*0.47);x.ganNeta=x.ventas-x.costos-x.gastos;});
    DB.cart=Object.values(cartMap);
    // Recalculate codes to avoid duplicates
    recalcCodes();

    // Load images from REFERENCIAS sheet
    var refR=await sheetGet('REFERENCIAS!A2:F').catch(function(){return [];});
    var imgMap={},descMap={};
    refR.forEach(function(r){
      var cod=String(r[1]||r[0]||'').trim();
      // Try col D (index 3) first, then col C (index 2)
      var img=String(r[3]||r[2]||'').trim();
      var desc=String(r[5]||r[4]||'').trim();
      if(cod&&img){
        // Convert any Drive URL format to thumbnail
        if(img.includes('drive.google.com')){
          var m2=img.match(/\/d\/([^/?]+)/)||img.match(/id=([^&]+)/);
          if(m2)img='https://drive.google.com/thumbnail?id='+m2[1]+'&sz=w300';
        }
        if(img.startsWith('http'))imgMap[cod]=img;
      }
      if(cod&&desc)descMap[cod]=desc;
    });
    // Assign images to products
    DB.prods.forEach(function(p){
      var img=imgMap[p.cod]||'';
      // Only use valid URLs
      if(img&&(img.startsWith('http')||img.startsWith('/')))p.img=img;
      if(descMap[p.cod])p.desc=descMap[p.cod];
    });

    DB.peds=[];
    pedR.forEach(function(r){
      function cleanNum(v){return parseFloat(String(v||'').replace(/[$, USD]/g,'').replace(/\./g,'').replace(/,/g,'.'))||0;}
      var uds=cleanNum(r[3]),envio=cleanNum(r[5]),total=cleanNum(r[6]);
      var bruto=cleanNum(r[4]);
      if(!uds)return;
      var fRaw=String(r[1]||''),f='';
      if(fRaw.includes('/')){var pp=fRaw.split('/');f=pp.length===3?(pp[2].length===4?pp[2]+'-'+pp[1].padStart(2,'0')+'-'+pp[0].padStart(2,'0'):pp[2]+'-'+pp[1].padStart(2,'0')+'-'+pp[0].padStart(2,'0')):fRaw;}
      else f=fRaw.slice(0,10);
      if(!total&&bruto)total=bruto+envio;
      DB.peds.push({num:r[0],f:f,ord:String(r[2]||'').trim(),uds:uds,bruto:bruto,envio:envio,flu:Math.round(envio/(uds||1)),total:total});
    });
    initHdr();hideSpl();rBalance();toast('Datos cargados desde Sheets');
  }catch(e){
    hideSpl();toast('Error cargando Sheets: '+e.message+'. Verifica que el Sheets sea publico.',1);
  }
  b.textContent='Sync';b.disabled=false;
}

function initHdr(){

  document.getElementById('hd-gn').textContent=COP(gN);
  document.getElementById('hd-ca').textContent=COP(cart);
  document.getElementById('hd-sk').textContent=DB.prods.filter(function(x){return x.sa>0;}).length;
}

function rBalance(){
  const a=filtrarAna();
  if(!DB.ana.length){document.getElementById('pane-balance').innerHTML='<div style="text-align:center;padding:30px;color:var(--warm)">Cargando datos...</div>';return;}
  if(!a.length){document.getElementById('pane-balance').innerHTML=añoBar('rBalance')+'<div style="text-align:center;padding:30px;color:var(--warm)">Sin datos para este año</div>';return;}
  const tV=a.reduce(function(s,x){return s+x.ventas;},0);
  const tG=a.reduce(function(s,x){return s+x.gastos;},0);
  const gN=a.reduce(function(s,x){return s+x.ganNeta;},0);
  const tC=a.reduce(function(s,x){return s+x.costos;},0);
  const mgN=tV?Math.round(gN/tV*100):0,mgB=tV?Math.round((tV-tC)/tV*100):0;
  const mejor=a.reduce(function(m,x){return x.ventas>m.ventas?x:m;},a[0]);
  const cart=DB.cart.reduce(function(s,x){return s+x.total;},0);
  const mxV=Math.max.apply(null,a.map(function(x){return x.ventas;}))||1;
  const avg=Math.round(tV/a.length);
  const bars=a.map(function(x){
    const hV=Math.round(x.ventas/mxV*64);
    const hG=Math.round(Math.abs(x.ganNeta)/mxV*64);
    const cls=x.ganNeta<0?'neg':'ok';
    return '<div class="bc"><div style="width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:72px;gap:1px"><div class="bf" style="height:'+hV+'px"></div><div class="bf '+cls+'" style="height:'+hG+'px"></div></div><div class="bl">'+x.mes.slice(0,3)+'</div></div>';
  }).join('');
  const rows=a.map(function(x){
    const sal=x.ganNeta>=SAL?'<span class="pill p-ok">Si +'+COP(x.ganNeta-SAL)+'</span>':'<span class="pill p-err">No -'+COP(SAL-x.ganNeta)+'</span>';
    return '<tr><td class="tdm" style="text-transform:capitalize">'+x.mes+'</td><td>'+x.año+'</td><td style="color:var(--lu);font-weight:700">'+COP(x.ventas)+'</td><td style="color:var(--err)">'+COP(x.gastos)+'</td><td style="color:'+(x.ganNeta>=0?'var(--ok)':'var(--err)')+';font-weight:700">'+COP(x.ganNeta)+'</td><td>'+sal+'</td></tr>';
  }).join('');
  document.getElementById('pane-balance').innerHTML=
    añoBar('rBalance')+
    '<div class="kg">'+
    '<div class="kc"><div class="kl">Ventas historicas</div><div class="kv">'+COP(tV)+'</div><div class="ks">'+a.length+' meses</div></div>'+
    '<div class="kc ok"><div class="kl">Ganancia neta</div><div class="kv ok">'+COP(gN)+'</div><div class="ks">'+mgN+'% margen</div></div>'+
    '<div class="kc err"><div class="kl">Cartera pendiente</div><div class="kv err">'+COP(cart)+'</div><div class="ks">'+DB.cart.length+' clientes</div></div>'+
    '<div class="kc"><div class="kl">Promedio mensual</div><div class="kv">'+COP(avg)+'</div></div>'+
    '<div class="kc ok"><div class="kl">Con stock</div><div class="kv ok">'+DB.prods.filter(function(x){return x.sa>0;}).length+'</div></div>'+
    '<div class="kc err"><div class="kl">Agotados</div><div class="kv err">'+DB.prods.filter(function(x){return x.sa<=0;}).length+'</div></div>'+
    '</div>'+
    '<div class="two">'+
    '<div class="card"><div class="ctit">Ventas y ganancia por mes</div><div class="bch" style="height:80px">'+bars+'</div></div>'+
    '<div class="card"><div class="ctit">Decisiones clave</div><div style="font-size:12px;line-height:1.9;color:var(--warm)">'+
    '<div><b style="color:var(--ok)">Mejor mes:</b> '+mejor.mes+' - '+COP(mejor.ventas)+'</div>'+
    '<div><b style="color:var(--lu)">Margen bruto:</b> '+mgB+'% neto: '+mgN+'%</div>'+
    '<div><b style="color:var(--ok)">Salario cubierto:</b> '+a.filter(function(x){return x.ganNeta>=SAL;}).length+'/'+a.length+' meses</div>'+
    '<div><b style="color:var(--err)">Cartera:</b> '+COP(cart)+'</div>'+
    '</div></div>'+
    '</div>'+
    '<div class="card" style="padding:0"><div class="tw"><table><thead><tr><th>Mes</th><th>Ano</th><th>Ventas</th><th>Gastos</th><th>Ganancia</th><th>Salario</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function eliminarReferencia(cod){
  var p=DB.prods.find(function(x){return x.cod===cod;});
  if(!p)return;
  if(!confirm('Eliminar '+p.nom+' ('+cod+') del inventario?'))return;
  DB.prods=DB.prods.filter(function(x){return x.cod!==cod;});
  scriptPost('eliminarProducto',{cod:cod});
  toast('Eliminado — '+p.nom);
  initHdr();rInv();
}

function checkPvMin(){
  var pvI=document.getElementById('em-pv');
  var alert=document.getElementById('em-pv-alert');
  if(!pvI||!alert)return;
  var pv=+pvI.value||0;
  var min=window._editPvMin||0;
  if(!pv||!min){alert.innerHTML='';return;}
  if(pv<min){
    pvI.style.borderColor='var(--err)';
    pvI.style.background='var(--err2)';
    alert.innerHTML='<span style="color:var(--err);font-weight:600">Por debajo del punto de equilibrio — minimo: '+COP(min)+'</span>';
  } else {
    pvI.style.borderColor='var(--ok)';
    pvI.style.background='var(--ok2)';
    var gan=Math.round(pv*0.9)-min;
    alert.innerHTML='<span style="color:var(--ok);font-weight:600">Ganancia via DEEP: '+COP(gan)+'</span>';
  }
}

function closeEditModal(){

}

function guardarEdicion(cod){
  var p=DB.prods.find(function(x){return x.cod===cod;});
  if(!p)return;
  var nom=document.getElementById('em-nom')?.value||p.nom;
  var cat=document.getElementById('em-cat')?.value||p.cat;
  var cu=+document.getElementById('em-cu')?.value||p.cu;
  var pv=+document.getElementById('em-pv')?.value||p.pv;
  var sa=+document.getElementById('em-sa')?.value;
  var desc=document.getElementById('em-desc')?.value||'';
  var col=document.getElementById('em-col')?.value||'';
  var imgRaw=document.getElementById('em-img')?.value||'';
  // Convert Drive URL to thumbnail
  var imgThumb='';
  if(imgRaw&&imgRaw.includes('drive.google.com')){
    var m=imgRaw.match(/\/d\/([^/?]+)/)||imgRaw.match(/id=([^&]+)/);
    if(m)imgThumb='https://drive.google.com/thumbnail?id='+m[1]+'&sz=w300';
  } else if(imgRaw&&imgRaw.startsWith('http')){
    imgThumb=imgRaw;
  }
  // Update local DB
  p.nom=nom;p.cat=cat;p.cu=cu;p.pv=pv;p.sa=sa;p.desc=desc;p.col=col;
  p.img=imgThumb;p.imgRaw=imgRaw;
  // Save to Sheets
  scriptPost('editarProducto',{cod:cod,nom:nom,cat:cat,cu:cu,pv:pv,sa:sa,desc:desc,col:col,img:imgRaw});
  closeEditModal();
  toast('Guardado — '+nom);
  initHdr();rInv();
}

function editPrecio(cod){
  var p=DB.prods.find(function(x){return x.cod===cod;});
  if(!p)return;
  var lp=DB.peds.length?DB.peds[DB.peds.length-1]:null;
  var flu=lp?lp.flu:0;
  var gfU=Math.round(GF/UM),salU=Math.round(SAL/UM);
  var cT=Math.round((p.cu+flu+EMP+gfU+salU)*1.1);
  var nuevo=prompt('Precio '+p.nom+' actual: '+COP(p.pv)+' | Min: '+COP(cT),p.pv||'');
  if(nuevo===null)return;
  var val=Math.round(parseFloat(String(nuevo).replace(/[$,.]/g,'').replace(/,/g,'.'))||0);
  if(!val){toast('Precio invalido',1);return;}
  if(val<cT&&!confirm('El precio '+COP(val)+' esta bajo el punto de equilibrio ('+COP(cT)+'). Confirmar?'))return;
  p.pv=val;
  scriptPost('editarPrecio',{cod:cod,pv:val});
  toast('Precio: '+p.nom+' = '+COP(val));
  rInv();
}

function rInv(){
  const pe=document.getElementById('pane-inv');
  const fE=pe.dataset.est||'todo',fC=pe.dataset.cat||'',fOrd=pe.dataset.ord||'nom';
  const q=(pe.dataset.q||'').toLowerCase();
  let pp=DB.prods.slice();
  if(fE==='rec'){
    pp=pp.slice().sort(function(a,b){return (b.rowIdx||0)-(a.rowIdx||0);}).slice(0,50);
  }
  else if(fE==='en')pp=pp.filter(function(x){return x.sa>0;});
  else if(fE==='ago')pp=pp.filter(function(x){return x.sa<=0;});
  else if(fE==='bajo')pp=pp.filter(function(x){return x.sa>0&&x.sa<=2;});
  else if(fE==='sp')pp=pp.filter(function(x){return !x.pv;});
  if(fC)pp=pp.filter(function(x){return x.cat===fC;});
  if(q)pp=pp.filter(function(x){return (x.nom||'').toLowerCase().includes(q)||(x.cod||'').toLowerCase().includes(q);});
  if(fE!=='rec'){
    if(fOrd==='stock')pp.sort(function(a,b){return b.sa-a.sa;});
    else if(fOrd==='precio')pp.sort(function(a,b){return b.pv-a.pv;});
    else pp.sort(function(a,b){return (a.nom||'').localeCompare(b.nom||'');});
  }
  const ie=DB.prods.filter(function(x){return x.sa>0;}).length;
  const ia=DB.prods.filter(function(x){return x.sa<=0;}).length;
  const pills=['rec','todo','en','ago','sp'].map(function(v){
    const labels={rec:'Recientes',todo:'Todos ('+DB.prods.length+')',en:'Con stock ('+ie+')',ago:'Agotados ('+ia+')',sp:'Sin precio'};
    return '<button class="fpill '+(fE===v?'on':'')+'" onclick="document.getElementById(\'pane-inv\').dataset.est=\''+v+'\';rInv()">'+labels[v]+'</button>';

function updCod(){const c=document.getElementById('np-cat')?.value||'ARETES',p=PREFS[c]||'LAR',n=(CODES[p]||0)+1,e=document.getElementById('np-c');if(e)e.value=p+String(n).padStart(3,'0');}
function calcNPq(){
  var cu=+document.getElementById('np-cu')?.value||0;
  if(!cu)return;
  var flu=Math.round(GF/10); // estimate flete per unit from last pedido
  if(DB.peds.length){var lp=DB.peds[DB.peds.length-1];flu=Math.round(lp.envio/lp.uds);}
  var gfU=Math.round(GF/UM),salU=Math.round(SAL/UM);
  var cd=cu+flu+EMP,ct=cd+gfU+salU,deep=Math.round(ct*0.1),cT=ct+deep;
  var sug=Math.round(cT/0.7);
  var gan=Math.round(sug*0.9)-cT;
  var pv=document.getElementById('np-pv');
  if(pv&&!pv.value)pv.value=sug;
  var des=document.getElementById('np-desglose');
  if(des)des.innerHTML='<div class="cbox" style="margin-bottom:12px">'+
    '<div class="crow"><span class="cl">Costo proveedor</span><span>'+COP(cu)+'</span></div>'+
    '<div class="crow"><span class="cl">+ Flete/ud</span><span>'+COP(flu)+'</span></div>'+
    '<div class="crow"><span class="cl">+ Empaque</span><span>'+COP(EMP)+'</span></div>'+
    '<div class="crow"><span class="cl">+ Gastos fijos/ud</span><span>'+COP(gfU)+'</span></div>'+
    '<div class="crow"><span class="cl">+ Salario/ud</span><span>'+COP(salU)+'</span></div>'+
    '<div class="crow"><span class="cl">+ DEEP 10%</span><span>'+COP(deep)+'</span></div>'+
    '<div class="dv"></div>'+
    '<div class="crow err"><span class="cl">Precio minimo (punto de equilibrio)</span><span>'+COP(cT)+'</span></div>'+
    '<div class="crow hi"><span>Precio sugerido (margen 30%)</span><span>'+COP(sug)+'</span></div>'+
    '<div class="crow ok"><span class="cl">Ganancia vendiendo directo</span><span>'+COP(Math.round(sug-cT))+'</span></div>'+
    '<div class="crow ok"><span class="cl">Ganancia via DEEP (-10%)</span><span>'+COP(gan)+'</span></div>'+
    '</div>';
}
function guardarP(){
  const nom=(document.getElementById('np-n')?.value||'').trim();if(!nom){toast('Nombre obligatorio',1);return;}
  const cat=document.getElementById('np-cat')?.value||'ARETES',pref=PREFS[cat]||'LAR';
  CODES[pref]=(CODES[pref]||0)+1;
  const cod=pref+String(CODES[pref]).padStart(3,'0');
  const p={cod:cod,cat:cat,nom:nom,cu:+document.getElementById('np-cu')?.value||0,pv:+document.getElementById('np-pv')?.value||0,sa:+document.getElementById('np-sa')?.value||0};
  DB.prods.unshift(p);

}
function cargaMasiva(){
  const txt=(document.getElementById('bulk')?.value||'').trim();if(!txt){toast('Pega tu lista primero',1);return;}
  let ok=0;
  txt.split('\n').filter(function(l){return l.trim();}).forEach(function(l){
    const p=l.split(',').map(function(x){return x.trim();});if(p.length<2)return;
    const nom=p[0],catR=(p[1]||'').toUpperCase(),cat=CATS.includes(catR)?catR:'OTROS';
    const cu=+p[2]||0,sa=+p[3]||0,pref=PREFS[cat]||'LO';
    CODES[pref]=(CODES[pref]||0)+1;
    const cod=pref+String(CODES[pref]).padStart(3,'0');
    const prod={cod:cod,cat:cat,nom:nom,cu:cu,pv:0,sa:sa};
    DB.prods.unshift(prod);scriptPost('producto',prod);ok++;
  });
  toast(ok+' productos cargados');
  document.getElementById('bulk').value='';
  ir('inv',document.querySelector('.nb:nth-child(2)'));
}

  const abo=+document.getElementById('mp-abo2')?.value||0;
  if(!abo){toast('Ingresa el abono',1);return;}
  const fechaPago=document.getElementById('mp-fecha2')?.value||new Date().toISOString().slice(0,10);
  const refKey=document.getElementById('mp-ref2')?.value||'';
  const c=DB.cart.find(function(x){return x.cli===pCliente;});
  if(c){

    let r=abo;
    (c.items||[]).forEach(function(it){if(r>0&&it.s>0){const q=Math.min(it.s,r);it.s-=q;r-=q;}});
    c.items=(c.items||[]).filter(function(x){return x.s>0;});
    if(c.total<=0)DB.cart=DB.cart.filter(function(x){return x.cli!==pCliente;});
  }
  recHoy+=abo;
  scriptPost('editarPago',{cli:pCliente,abono:abo,fecha:fechaPago,refKey:refKey});

function getColParams(){
  return {
    flt:+document.getElementById('col-flt')?.value||0,
    uds:+document.getElementById('col-uds')?.value||1,
    emp:+document.getElementById('col-emp')?.value||1380,
    gf:+document.getElementById('col-gf')?.value||550000,
    sal:+document.getElementById('col-sal')?.value||600000,
    um:+document.getElementById('col-um')?.value||66
  };
}

function calcPrecioCol(cu,p){
  var fluU=Math.round(p.flt/p.uds);
  var gfU=Math.round(p.gf/p.um);
  var salU=Math.round(p.sal/p.um);
  var cd=cu+fluU+p.emp;
  var ct=cd+gfU+salU;
  var deep=Math.round(ct*0.1);
  var cTotal=ct+deep;
  // Precio sugerido = punto de equilibrio (margen 0%)
  // Tu lo ajustas hacia arriba segun el mercado
  var sug=cTotal;
  return {fluU:fluU,gfU:gfU,salU:salU,cd:cd,ct:ct,cTotal:cTotal,sug:sug};
}

function recalcCol(){
  var gfC=+document.getElementById('col-gf')?.value;
  var salC=+document.getElementById('col-sal')?.value;
  var umC=+document.getElementById('col-um')?.value;
  if(gfC)GF=gfC;
  if(salC)SAL=salC;
  if(umC)UM=umC;
  saveCalcSettings();
  var p=getColParams();
  COLECCION.forEach(function(r){
    var c=calcPrecioCol(r.cu,p);
    r.calc=c;r.pvMin=c.cTotal;
    if(r.pv<c.cTotal)r.pv=c.sug; // auto-ajustar si está por debajo
  });
  renderTablaCol();
}

function editFotoCol(i){
  var url=prompt('Pega el link de Google Drive para "'+COLECCION[i].nom+'":', COLECCION[i].imgRaw||'');
  if(url===null)return;
  var imgUrl='';
  if(url&&url.includes('drive.google.com')){
    var m=url.match(/\/d\/([^/]+)/);
    if(m){
      var fid=m[1];
      // Use thumbnail URL - works without login for public files
      imgUrl='https://drive.google.com/thumbnail?id='+fid+'&sz=w300';
    }
  } else if(url) {
    imgUrl=url; // direct URL
  }
  COLECCION[i].imgRaw=url;
  COLECCION[i].img=imgUrl;
  renderTablaCol();
  toast('Foto actualizada para '+COLECCION[i].nom);
}

function exportColCSV(){
  if(!COLECCION.length){toast('Agrega referencias primero',1);return;}
  var rows=COLECCION.map(function(r){return [r.cod,r.nom,r.cat,r.cu,r.pv,r.pv>=r.pvMin?'OK':'REVISAR'];});
  var csv=[['Codigo','Nombre','Categoria','Costo','Precio','Estado']].concat(rows).map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='Coleccion_Luz.csv';a.click();

function cargarColeccion(){
  if(!COLECCION.length){toast('Agrega referencias primero',1);return;}
  var errores=COLECCION.filter(function(r){return r.pv<r.pvMin;});
  if(errores.length){
    if(!confirm(errores.length+' referencias estan por debajo del punto de equilibrio. Cargar de todas formas?'))return;
  }
  var total=COLECCION.length;
  var idx=0;
  var btn=document.querySelector('[onclick="cargarColeccion()"]');
  if(btn){btn.disabled=true;btn.textContent='Cargando 0/'+total+'...';}

  function enviarLote(){
    if(idx>=COLECCION.length){
      toast(total+' referencias cargadas en Sheets');
      COLECCION=[];
      renderTablaCol();
      if(btn){btn.disabled=false;btn.textContent='Cargar '+total+' referencias al inventario';}
      initHdr();
      return;
    }
    var r=COLECCION[idx];
    var _rawImg=r.imgRaw||'';
    var _thumbImg=r.img||''; // thumbnail already converted by editFotoCol
    if(!_thumbImg&&_rawImg&&_rawImg.includes('drive.google.com')){
      var _m=_rawImg.match(/\/d\/([^/]+)/);
      if(_m)_thumbImg='https://drive.google.com/thumbnail?id='+_m[1]+'&sz=w300';
    }
    var prod={cod:r.cod,cat:r.cat,nom:r.nom,cu:r.cu,pv:r.pv,sa:r.sa||0,img:_thumbImg,desc:r.desc||'',col:r.col||''};
    DB.prods.unshift(prod);
    scriptPost('producto',prod);
    idx++;
    if(btn)btn.textContent='Cargando '+idx+'/'+total+'...';
    // Wait 800ms between each to avoid Apps Script timeout
    setTimeout(enviarLote, 800);
  }
  enviarLote();
}

function calcC(){
  // Save user values to persist across tab switches
  var gfI=+document.getElementById('c-gf')?.value;
  var salI=+document.getElementById('c-sal')?.value;
  var umI=+document.getElementById('c-um')?.value;
  var empI=+document.getElementById('c-emp')?.value;
  if(gfI)GF=gfI;
  if(salI)SAL=salI;
  if(umI)UM=umI;
  if(empI)EMP=empI;
  saveCalcSettings();
  const cu=+document.getElementById('c-cu')?.value||0,flt=+document.getElementById('c-flt')?.value||0,uni=+document.getElementById('c-uni')?.value||1,em=+document.getElementById('c-em')?.value||EMP;
  const gf=+document.getElementById('c-gf')?.value||GF,sal=+document.getElementById('c-sal')?.value||SAL,um=+document.getElementById('c-um')?.value||UM,mg=+document.getElementById('c-mg')?.value||30,dsc=+document.getElementById('c-dsc')?.value||0;
  const fl=Math.round(flt/(uni||1)),gfU=Math.round(gf/um),salU=Math.round(sal/um),cd=cu+fl+em,ct=cd+gfU+salU,dv=Math.round(ct*0.1),cT=ct+dv;
  const sug=mg<100?Math.round(cT/(1-mg/100)):cT,ganD=sug-cT,ganDp=Math.round(sug*0.9)-cT,roi=cu?Math.round(ganD/cu*100):0;
  const dscP=Math.round(sug*(1-dsc/100)),ganDsc=dscP-cT,mc=sug-ct,ue=mc>0?Math.ceil((gf+sal)/mc):0;
  function s(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}
  s('r-cu',COP(cu));s('r-fl',COP(fl));s('r-em',COP(em));s('r-cd',COP(cd));s('r-gf',COP(gfU));s('r-sa',COP(salU));s('r-dp',COP(dv));
  s('r-mn',COP(cT));s('r-sg',COP(sug));s('r-gd',COP(ganD));s('r-gde',COP(ganDp));s('r-roi',roi+'%');s('r-tot',COP(gf+sal));s('r-mc',COP(mc));s('r-ue',ue+' uds');s('r-ve',COP(ue*sug));
  s('c-dpv',COP(dscP));const ok=ganDsc>0;s('c-dok',ok?'Si, ganas '+COP(ganDsc):'No, pierdes '+COP(-ganDsc));
  const dok=document.getElementById('c-dok');if(dok)dok.style.color=ok?'var(--ok)':'var(--err)';
}

function calcProy(){

      '<div class="g2"><div class="fg"><label>Flete / unidad (calculado)</label><input type="number" id="ped-fu" readonly></div><div class="fg"><label>Nota / coleccion</label><input id="ped-nota" placeholder="Ej: Coleccion 8 cadenas doradas"></div></div>'+
      '<div class="brow"><button class="btn btn-lu" onclick="guardarPed()">Registrar pedido en Sheets</button></div>'+
    '</div>';
}

function selPedCol(idx){
  if(idx===''){
    var info=document.getElementById('col-ped-info');
    if(info)info.innerHTML='';
    var card=document.getElementById('col-params-card');
    if(card)card.style.display='none';
    var agr=document.getElementById('col-sub0');
    if(agr)agr.style.display='none';
    return;
  }
  var p=DB.peds[parseInt(idx)];if(!p)return;
  var flt=document.getElementById('col-flt');
  var uds=document.getElementById('col-uds');
  if(flt)flt.value=p.envio;
  if(uds)uds.value=p.uds;
  // Show pedido summary
  var info=document.getElementById('col-ped-info');
  if(info)info.innerHTML=
    '<div class="cbox" style="margin-top:10px">'+
    '<div class="crow"><span class="cl">Pedido</span><span style="font-weight:700">#'+p.num+'</span></div>'+
    '<div class="crow"><span class="cl">Fecha</span><span>'+p.f+'</span></div>'+
    '<div class="crow"><span class="cl">Unidades totales</span><span style="font-weight:700;color:var(--dk)">'+p.uds+' uds</span></div>'+
    '<div class="crow"><span class="cl">Flete total pagado</span><span style="color:var(--err)">'+COP(p.envio)+'</span></div>'+
    '<div class="crow hi"><span>Flete por unidad</span><span>'+COP(p.flu)+'/ud</span></div>'+
    '</div>';
  // Show params card and form
  var card=document.getElementById('col-params-card');
  if(card)card.style.display='block';
  var sub0=document.getElementById('col-sub0');
  if(sub0)sub0.style.display='block';
  recalcCol();
  toast('Pedido #'+p.num+' cargado — flete/ud: '+COP(p.flu));
}

function usarPedido(i){
  var p=DB.peds[i];if(!p)return;
  // Go to + Producto and pre-fill pedido data
  ir('np',document.querySelector('.nb:nth-child(3)'));
  setTimeout(function(){
    npTab(1); // switch to coleccion tab
    setTimeout(function(){
      var flt=document.getElementById('col-flt');
      var uds=document.getElementById('col-uds');
      if(flt)flt.value=p.envio;
      if(uds)uds.value=p.uds;
      recalcCol();
      toast('Pedido #'+p.num+' cargado — flete: '+COP(p.flu)+'/ud');
    },100);
  },100);
}

function cFl(){const e=+document.getElementById('ped-e')?.value||0,u=+document.getElementById('ped-u')?.value||1;const fu=document.getElementById('ped-fu');if(fu)fu.value=Math.round(e/u);}
function guardarPed(){
  const u=+document.getElementById('ped-u')?.value||0,e=+document.getElementById('ped-e')?.value||0;
  if(!u){toast('Ingresa las unidades',1);return;}
  const p={num:DB.peds.length+1,f:document.getElementById('ped-f')?.value,ord:document.getElementById('ped-ord')?.value||'',uds:u,bruto:+document.getElementById('ped-b')?.value||0,envio:e,flu:Math.round(e/u),total:(+document.getElementById('ped-b')?.value||0)+e};
  DB.peds.push(p);scriptPost('pedido',p);rPeds();toast('Pedido guardado en Sheets');
}

cargar();

// Global event delegation - persists across all re-renders
document.body.addEventListener('click',function(e){
  var invImg=e.target.closest('.inv-img');
  if(invImg){verFoto(invImg.src);return;}
  var btn=e.target.closest('.ebtn');
  if(!btn)return;
  var cod=btn.dataset.cod,act=btn.dataset.act;
  if(act==='edit')editReferencia(cod);
  if(act==='del')eliminarReferencia(cod);
});
</script></body></html>
