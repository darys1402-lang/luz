<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Luz Accesorios</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--lu:#C4A882;--lu2:#D8BC9A;--lu3:#F5EDE0;--lu4:#FAF6F0;--cr:#FFFCF8;--dk:#3A2A18;--mid:#5C4430;--warm:#8A7060;--ok:#4A7A38;--ok2:#EAF2E0;--err:#9A3030;--err2:#FCE8E8;--info:#2A5280;--info2:#E4EDF8;--bd:rgba(196,168,130,.2);--bd2:rgba(196,168,130,.4);--r:9px;--r2:14px;--sh:0 2px 8px rgba(58,42,24,.06)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Nunito',sans-serif;font-size:14px;background:var(--lu4);color:var(--dk);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.banner{background:#fff;border-bottom:1px solid var(--lu3);height:62px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 6px rgba(196,168,130,.1)}
.blogo{display:flex;align-items:center;gap:8px}
.b-r{display:flex;align-items:center;gap:14px}
.bst b{display:block;font-size:13px;font-weight:700;color:var(--lu)}
.bst small{font-size:9px;color:var(--warm);letter-spacing:1px;text-transform:uppercase;display:block}
.bsync{background:var(--lu3);border:1.5px solid var(--lu2);border-radius:20px;color:var(--mid);padding:5px 13px;font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase;font-family:'Nunito',sans-serif;transition:all .2s}
.bsync:hover{background:var(--lu);color:#fff}
.nav{background:#fff;display:flex;overflow-x:auto;flex-shrink:0;border-bottom:1.5px solid var(--lu3);scrollbar-width:none;padding:0 6px}
.nav::-webkit-scrollbar{display:none}
.nb{background:none;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;color:var(--warm);font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:.8px;text-transform:uppercase;font-weight:700;padding:10px 12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.nb:hover{color:var(--lu)}.nb.on{color:var(--lu);border-bottom-color:var(--lu)}
.ct{flex:1;overflow:auto;padding:14px;background:var(--lu4)}
.pane{display:none}.pane.on{display:block;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
#spl{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .35s}
#spl.h{opacity:0;pointer-events:none}
.sp-w{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.sp-t{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--warm);margin-bottom:22px}
.spn{width:22px;height:22px;border:2px solid var(--lu3);border-top-color:var(--lu);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#tst{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--dk);color:var(--lu);padding:9px 20px;border-radius:20px;font-size:11px;font-weight:700;opacity:0;transition:all .25s;pointer-events:none;z-index:999;border:1px solid var(--lu);white-space:nowrap}
#tst.sh{opacity:1;transform:translateX(-50%) translateY(0)}
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px;margin-bottom:12px}
.kc{background:var(--cr);border:1px solid var(--bd);border-radius:var(--r2);padding:13px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:var(--lu)}
.kc.ok::before{background:var(--ok)}.kc.err::before{background:var(--err)}.kc.info::before{background:var(--info)}
.kl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--warm);margin-bottom:5px;font-weight:700}
.kv{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--lu)}
.kv.ok{color:var(--ok)}.kv.err{color:var(--err)}.kv.info{color:var(--info)}
.ks{font-size:10px;color:var(--warm);margin-top:3px}
.card{background:var(--cr);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:11px;box-shadow:var(--sh)}
.ctit{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--dk);margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.fg label{font-size:10px;color:var(--mid);letter-spacing:.5px;font-weight:700;text-transform:uppercase}
.fg input,.fg select,.fg textarea{padding:8px 11px;border:1.5px solid var(--bd2);border-radius:var(--r);background:var(--lu4);color:var(--dk);font-family:'Nunito',sans-serif;font-size:13px;width:100%;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:var(--lu);background:var(--cr)}
.fg input[readonly]{background:var(--lu3);color:var(--warm)}
.fg textarea{resize:vertical;min-height:80px}
.btn{padding:8px 16px;border-radius:20px;border:1.5px solid var(--bd2);background:var(--cr);color:var(--dk);font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--lu3)}.btn-lu{background:var(--lu);color:#fff;border-color:var(--lu)}.btn-lu:hover{background:var(--lu2);color:var(--dk)}
.btn-sm{padding:4px 12px;font-size:10px}.btn-gh{background:none;border-color:transparent;color:var(--warm)}
.brow{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:8px 9px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--warm);border-bottom:1.5px solid var(--bd2);font-weight:700;background:var(--lu3);white-space:nowrap}
td{padding:8px 9px;border-bottom:1px solid var(--bd);color:var(--warm);vertical-align:middle}
tr:hover td{background:var(--lu3)}.tdm{color:var(--dk);font-weight:600}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;white-space:nowrap}
.p-ok{background:var(--ok2);color:var(--ok)}.p-err{background:var(--err2);color:var(--err)}
.p-lu{background:var(--lu3);color:var(--mid)}.p-info{background:var(--info2);color:var(--info)}.p-warn{background:#FEF3E2;color:#7A5A10}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.fpill{background:none;border:1.5px solid var(--bd2);border-radius:20px;padding:3px 11px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--warm);transition:all .12s}
.fpill:hover,.fpill.on{background:var(--lu);border-color:var(--lu);color:#fff}
.bch{display:flex;align-items:flex-end;gap:4px}
.bc{display:flex;flex-direction:column;align-items:center;flex:1}
.bf{width:100%;background:linear-gradient(180deg,var(--lu2),var(--lu));border-radius:4px 4px 0 0;min-height:2px}
.bf.ok{background:linear-gradient(180deg,#90C878,var(--ok))}.bf.neg{background:#C8B8A8}
.bl{font-size:8px;color:var(--warm);margin-top:3px;font-weight:600}
.sb input{width:100%;margin-bottom:10px;padding:9px 13px;border:1.5px solid var(--bd2);border-radius:20px;background:var(--cr);color:var(--dk);font-family:'Nunito',sans-serif;font-size:13px;outline:none}
.sb input:focus{border-color:var(--lu)}
.inv-tbl{background:var(--cr);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh)}
.inv-row{display:grid;grid-template-columns:78px 1fr 70px 46px 80px 88px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.inv-row:hover{background:var(--lu3)}.inv-row>div{padding:8px 7px;font-size:11px;color:var(--warm)}
.inv-row>.n{color:var(--dk);font-weight:600}.inv-head>div{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:var(--lu3)}
.cc{background:var(--cr);border:1px solid var(--bd);border-left:3px solid var(--lu);border-radius:var(--r2);padding:12px 14px;margin-bottom:9px}
.cbox{background:var(--lu4);border:1.5px solid var(--bd);border-radius:var(--r);padding:12px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);font-size:11px}
.crow:last-child{border-bottom:none;padding-top:7px;font-size:13px;font-weight:600}
.crow.hi{color:var(--lu);font-weight:600}.crow.ok{color:var(--ok)}.crow.err{color:var(--err)}
.cl{color:var(--warm)}.dv{height:1px;background:var(--bd2);margin:6px 0}
.mb-bg{width:100%;height:9px;background:var(--lu3);border-radius:5px;overflow:hidden;margin:6px 0 3px}
.mb-fl{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--lu),var(--lu2));transition:width .4s}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:10px;color:var(--warm);width:80px;flex-shrink:0;font-weight:600;text-transform:capitalize;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-bg{flex:1;height:6px;background:var(--lu3);border-radius:3px;overflow:hidden}
.bar-fl{height:100%;border-radius:3px}
.bar-val{font-size:10px;font-weight:700;min-width:85px;text-align:right}
.its{display:flex;border-bottom:1.5px solid var(--bd);margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.its::-webkit-scrollbar{display:none}
.it{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1.5px;padding:7px 13px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;color:var(--warm);font-family:'Nunito',sans-serif;font-weight:700;white-space:nowrap}
.it.on{color:var(--lu);border-bottom-color:var(--lu)}
.ip{display:none}.ip.on{display:block}
.nota{background:var(--lu3);border:1px solid var(--bd2);border-radius:var(--r);padding:9px 13px;font-size:11px;color:var(--mid);margin-bottom:11px;line-height:1.6;font-weight:500}
.nota strong{color:var(--dk)}.nota.info{background:var(--info2);border-color:var(--info);color:var(--info)}
.ov{position:fixed;inset:0;background:rgba(58,42,24,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(2px)}
.ov.sh{display:flex}
.mo{background:var(--cr);border-radius:var(--r2);width:100%;max-width:460px;max-height:88vh;overflow:auto;border:1px solid var(--bd)}
.mh{padding:13px 16px 11px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mh h3{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--dk)}
.mb2{padding:14px 16px}.mf{padding:11px 16px;border-top:1px solid var(--bd);display:flex;gap:7px;justify-content:flex-end}
.xb{background:none;border:none;font-size:18px;cursor:pointer;color:var(--warm)}
.emp{text-align:center;padding:24px;color:var(--warm);font-size:11px}
.emp-ico{font-size:26px;margin-bottom:6px;opacity:.4}
.sg{display:none;position:absolute;top:100%;left:0;right:0;background:var(--cr);border:1.5px solid var(--bd2);border-radius:var(--r);z-index:50;max-height:160px;overflow:auto;box-shadow:var(--sh)}
.sg.sh{display:block}
.si{padding:8px 11px;cursor:pointer;font-size:11px;border-bottom:1px solid var(--bd);font-weight:500}
.si:hover{background:var(--lu3)}
@media(max-width:600px){.two{grid-template-columns:1fr}.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}.kg{grid-template-columns:1fr 1fr}.ct{padding:10px}.banner{height:54px;padding:0 10px}.b-r .bst:first-child{display:none}.inv-row{grid-template-columns:68px 1fr 60px 80px 85px}}
</style>
</head>

<script>

const COP=n=>'$'+Math.round(+n||0).toLocaleString('es-CO');
const SAL=600000,GF=550000,UM=66,EMP=1380;

function ir(pg,b){
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
  document.getElementById('pane-'+pg).classList.add('on');

  ({balance:rBalance,inv:rInv,np:()=>rNP(),ventas:rVentas,carta:rCarta,
    gastos:rGastos,calc:rCalc,metas:rMetas,fin:rFin,peds:rPeds})[pg]?.();
}

  document.querySelectorAll('#pane-'+p+' .ip').forEach(x=>x.classList.remove('on'));

}

  t.textContent=(e?'⚠ ':'✓ ')+m;

}

// ── GOOGLE SHEETS API ────────────────────────────────────────
async function sheetGet(range){
  const url=BASE+encodeURIComponent(range)+'?key='+API_KEY;
  const r=await fetch(url);
  if(!r.ok)throw new Error('Error leyendo Sheets: '+r.status);
  const d=await r.json();
  return d.values||[];
}

async function scriptPost(accion, datos){
  const url='https://script.google.com/macros/s/AKfycbzpSMyyPvWtUr8Y5uEywB2ioJPkE-Pa9yaeOi78biR6EynyG6NF2mDYZLRHXQmZd2-CtA/exec';
  const r=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({accion,...datos}),
    mode:'no-cors'
  });
  // no-cors no devuelve respuesta legible pero sí guarda en Sheets
  return {ok:true};
}

// ── CARGAR DATOS ─────────────────────────────────────────────
async function cargar(){
  const b=document.getElementById('bsy');
  b.textContent='↺ Cargando...';b.disabled=true;
  try{
    // Leer todas las hojas en paralelo
    const [invR,ventR,gastR,pedR]=await Promise.all([
      sheetGet('INVENTARIO!A2:S'),
      sheetGet('VENTAS!A2:L'),
      sheetGet('GASTOS!A2:E'),
      sheetGet('PEDIDOS!A2:G')
    ]);

    // PRODUCTOS
    DB.prods=[];
    CODES={LAR:0,LC:0,LP:0,LAN:0,LEAR:0,LS:0,LG:0,LJ:0,LO:0};
    invR.forEach(r=>{
      const cod=String(r[1]||'').trim(),nom=String(r[4]||'').trim();
      if(!cod||!nom)return;
      const cat=String(r[3]||'').trim();
      const cu=Math.round(parseFloat(r[5])||0);
      const pv=Math.round(parseFloat(r[11])||0);
      const sa=Math.round(parseFloat(r[18])||0);
      DB.prods.push({cod,cat,nom,cu,pv,sa});
      // Actualizar códigos
      Object.values(PREFS).forEach(pref=>{
        if(cod.toUpperCase().startsWith(pref)){
          const n=parseInt(cod.replace(/\D/g,''))||0;
          if(n>CODES[pref])CODES[pref]=n;
        }
      });
    });

    // VENTAS → resumen mensual + cartera
    const anaMap={},cartMap={};
    ventR.forEach(r=>{
      const fRaw=r[0],mes=String(r[1]||'').trim().toLowerCase();
      const cli=String(r[2]||'').trim(),ref=String(r[4]||'').trim();
      const pv=parseFloat(r[5])||0,sal=parseFloat(r[10])||0;
      const año=fRaw?String(fRaw).slice(0,4):'';
      if(!mes||!pv)return;
      const key=año+'_'+mes;
      if(!anaMap[key])anaMap[key]={año,mes,ventas:0,gastos:0,n:0};
      anaMap[key].ventas+=pv;anaMap[key].n++;
      if(sal>0&&cli){
        if(!cartMap[cli])cartMap[cli]={cli,total:0,items:[]};
        cartMap[cli].total+=sal;
        cartMap[cli].items.push({p:ref,f:String(fRaw||'').slice(0,10),s:sal});
      }
    });

    // GASTOS → agregar al analisis
    gastR.forEach(r=>{
      const fRaw=r[0],mes=String(r[1]||'').trim().toLowerCase();
      const val=parseFloat(r[3])||0,año=fRaw?String(fRaw).slice(0,4):'';
      if(!mes||val<=0)return;
      const key=año+'_'+mes;
      if(!anaMap[key])anaMap[key]={año,mes,ventas:0,gastos:0,n:0};
      anaMap[key].gastos+=val;
      // También guardar en DB.gastos para el módulo
      DB.gastos.push({f:String(fRaw||'').slice(0,10),mes,cat:String(r[2]||'').trim(),dsc:String(r[2]||'').trim(),val});
    });

    // Ordenar analisis
    const ORDEN=MES_S;
    DB.ana=Object.values(anaMap)
      .filter(x=>x.ventas>0)
      .sort((a,b)=>a.año!==b.año?a.año.localeCompare(b.año):ORDEN.indexOf(a.mes)-ORDEN.indexOf(b.mes));
    DB.ana.forEach(x=>{
      x.costos=Math.round(x.ventas*0.47);
      x.ganNeta=x.ventas-x.costos-x.gastos;
    });

    DB.cart=Object.values(cartMap);

    // PEDIDOS
    DB.peds=[];
    pedR.forEach(r=>{
      const num=r[0],uds=parseFloat(r[3])||0,envio=parseFloat(r[5])||0,total=parseFloat(r[6])||0;
      if(!uds)return;
      DB.peds.push({num,f:String(r[1]||'').slice(0,10),ord:String(r[2]||'').trim(),uds,envio,flu:Math.round(envio/uds),total});
    });

    initHdr();
    hideSpl();
    rBalance();
    toast('Datos cargados desde Sheets ✓');
  }catch(e){
    hideSpl();
    toast('Error: '+e.message+' — verifica que el Sheets sea público',1);
    console.error(e);
  }finally{
    b.textContent='↺ Sync';b.disabled=false;
  }
}

function calcC(){
  const cu=+document.getElementById('c-cu')?.value||0,flt=+document.getElementById('c-flt')?.value||0,uni=+document.getElementById('c-uni')?.value||1,em=+document.getElementById('c-em')?.value||EMP;
  const gf=+document.getElementById('c-gf')?.value||GF,sal=+document.getElementById('c-sal')?.value||SAL,um=+document.getElementById('c-um')?.value||UM,mg=+document.getElementById('c-mg')?.value||30,dsc=+document.getElementById('c-dsc')?.value||0;
  const fl=Math.round(flt/(uni||1)),gfU=Math.round(gf/um),salU=Math.round(sal/um),cd=cu+fl+em,ct=cd+gfU+salU,dv=Math.round(ct*.1),cT=ct+dv;
  const sug=mg<100?Math.round(cT/(1-mg/100)):cT,ganD=sug-cT,ganDp=Math.round(sug*.9)-cT,roi=cu?Math.round(ganD/cu*100):0;
  const dscP=Math.round(sug*(1-dsc/100)),ganDsc=dscP-cT,mc=sug-ct,ue=mc>0?Math.ceil((gf+sal)/mc):0;
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  s('r-cu',COP(cu));s('r-fl',COP(fl));s('r-em',COP(em));s('r-cd',COP(cd));s('r-gf',COP(gfU));s('r-sa',COP(salU));s('r-dp',COP(dv));s('r-mn',COP(cT));s('r-sg',COP(sug));s('r-gd',COP(ganD));s('r-gde',COP(ganDp));s('r-roi',roi+'%');s('r-tot',COP(gf+sal));s('r-mc',COP(mc));s('r-ue',ue+' uds');s('r-ve',COP(ue*sug));
  s('c-dpv',COP(dscP));const ok=ganDsc>0;s('c-dok',ok?'✅ Sí, ganas '+COP(ganDsc):'❌ No, pierdes '+COP(-ganDsc));const dok=document.getElementById('c-dok');if(dok)dok.style.color=ok?'var(--ok)':'var(--err)';
}

// ── FINANCIERO ────────────────────────────────────────────────
function rFin(){
  const a=DB.ana,tV=a.reduce((s,x)=>s+x.ventas,0),tC=a.reduce((s,x)=>s+x.costos,0);
  const tG=a.reduce((s,x)=>s+x.gastos,0),gN=a.reduce((s,x)=>s+x.ganNeta,0);
  const mgB=tV?Math.round((tV-tC)/tV*100):0,mgN=tV?Math.round(gN/tV*100):0,mxV=Math.max(...a.map(x=>x.ventas),1);
  let ac=0;
  document.getElementById('pane-fin').innerHTML=`
  <div class="its">
    <button class="it on" onclick="sT('ff-r',this,'pane-fin')">Resumen</button>
    <button class="it" onclick="sT('ff-f',this,'pane-fin')">Flujo de caja</button>
    <button class="it" onclick="sT('ff-s',this,'pane-fin')">Mi salario</button>
  </div>
  <div id="ff-r" class="ip on">
    <div class="kg">
      <div class="kc"><div class="kl">Ingresos totales</div><div class="kv">${COP(tV)}</div></div>
      <div class="kc err"><div class="kl">Costos productos</div><div class="kv err">${COP(tC)}</div></div>
      <div class="kc ok"><div class="kl">Utilidad bruta</div><div class="kv ok">${COP(tV-tC)}</div><div class="ks">${mgB}% margen</div></div>
      <div class="kc err"><div class="kl">Gastos operativos</div><div class="kv err">${COP(tG)}</div></div>
      <div class="kc ok"><div class="kl">Ganancia neta</div><div class="kv ok">${COP(gN)}</div><div class="ks">${mgN}% margen</div></div>
      <div class="kc"><div class="kl">Para reinvertir</div><div class="kv">${COP(gN-SAL*a.length)}</div></div>
    </div>
    <div class="two">
      <div class="card"><div class="ctit">Por mes</div><div class="bch" style="height:80px">${a.map(x=>`<div class="bc"><div style="width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:72px;gap:1px"><div class="bf" style="height:${Math.round(x.ventas/mxV*64)}px"></div><div class="bf ${x.ganNeta<0?'neg':'ok'}" style="height:${Math.round(Math.abs(x.ganNeta)/mxV*64)}px"></div></div><div class="bl">${x.mes.slice(0,3)}</div></div>`).join('')}</div></div>
      <div class="card"><div class="ctit">Estado de resultados</div>
        <div class="cbox">
          <div class="crow"><span class="cl">Ingresos</span><span style="color:var(--lu);font-weight:700">${COP(tV)}</span></div>
          <div class="crow err"><span class="cl">- Costos ventas</span><span>-${COP(tC)}</span></div>
          <div class="dv"></div>
          <div class="crow ok"><span class="cl">Utilidad bruta (${mgB}%)</span><span>${COP(tV-tC)}</span></div>
          <div class="crow err"><span class="cl">- Gastos operativos</span><span>-${COP(tG)}</span></div>
          <div class="dv"></div>
          <div class="crow ${gN>=0?'ok':'err'}" style="font-size:13px"><span class="cl">Ganancia neta (${mgN}%)</span><span>${COP(gN)}</span></div>
        </div>
      </div>
    </div>
  </div>
  <div id="ff-f" class="ip">
    <div class="card" style="padding:0"><div class="tw"><table>
      <thead><tr><th>Mes</th><th>Año</th><th>Ventas</th><th>Gastos</th><th>Ganancia</th><th>¿Cubrió?</th><th>Acumulado</th></tr></thead>
      <tbody>${a.map(x=>{ac+=x.ganNeta;return`<tr><td class="tdm" style="text-transform:capitalize">${x.mes}</td><td>${x.año}</td><td style="color:var(--lu);font-weight:700">${COP(x.ventas)}</td><td style="color:var(--err)">${COP(x.gastos)}</td><td style="color:${x.ganNeta>=0?'var(--ok)':'var(--err)'};font-weight:700">${COP(x.ganNeta)}</td><td>${x.ganNeta>=SAL?'<span class="pill p-ok">Sí</span>':'<span class="pill p-err">No</span>'}</td><td style="color:${ac>=0?'var(--lu)':'var(--err)'};font-weight:700">${COP(ac)}</td></tr>`;}).join('')}</tbody>
    </table></div></div>
  </div>
  <div id="ff-s" class="ip">
    <div class="kg">
      <div class="kc ok"><div class="kl">Meses que cubrieron</div><div class="kv ok">${a.filter(x=>x.ganNeta>=SAL).length}/${a.length}</div></div>
      <div class="kc ok"><div class="kl">Excedente total</div><div class="kv ok">${COP(a.reduce((s,x)=>s+Math.max(0,x.ganNeta-SAL),0))}</div></div>
      <div class="kc err"><div class="kl">Meses difíciles</div><div class="kv err">${a.filter(x=>x.ganNeta<SAL).length}</div></div>
    </div>
    <div class="card" style="padding:0"><div class="tw"><table>
      <thead><tr><th>Mes</th><th>Ganancia</th><th>Salario (${COP(SAL)})</th><th>Resultado</th></tr></thead>
      <tbody>${a.map(x=>`<tr><td class="tdm" style="text-transform:capitalize">${x.mes}</td><td style="color:${x.ganNeta>=0?'var(--ok)':'var(--err)'};font-weight:700">${COP(x.ganNeta)}</td><td style="color:var(--warm)">${COP(SAL)}</td><td>${x.ganNeta>=SAL?`<span class="pill p-ok">+${COP(x.ganNeta-SAL)}</span>`:`<span class="pill p-err">-${COP(SAL-x.ganNeta)}</span>`}</td></tr>`).join('')}</tbody>
    </table></div></div>
  </div>`;
}

// ── PEDIDOS ───────────────────────────────────────────────────
function rPeds(){
  document.getElementById('pane-peds').innerHTML=`
  <div class="nota">Flete/ud = envío total ÷ unidades. Úsalo en la Calculadora al crear productos de esa colección.</div>
  ${DB.peds.length?`<div class="card" style="padding:0;margin-bottom:12px"><div class="tw"><table>
    <thead><tr><th>#</th><th>Fecha</th><th>Orden</th><th>Unidades</th><th>Envío</th><th>Flete/ud</th><th>Total</th></tr></thead>
    <tbody>${DB.peds.map(p=>`<tr><td class="tdm">#${p.num}</td><td>${p.f}</td><td style="font-size:10px;color:var(--warm)">${p.ord||'—'}</td><td style="font-weight:700;color:var(--dk)">${p.uds}</td><td style="color:var(--err);font-weight:700">${COP(p.envio)}</td><td><span class="pill p-warn">${COP(p.flu)}/ud</span></td><td style="color:var(--lu);font-weight:700">${COP(p.total)}</td></tr>`).join('')}</tbody>
  </table></div></div>`:'<div class="emp"><div class="emp-ico">📦</div>Cargando pedidos desde Sheets...</div>'}
  <div class="card"><div class="ctit">Agregar nuevo pedido</div>
    <div class="g2">
      <div class="fg"><label>Fecha</label><input type="date" id="ped-f" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="fg"><label>Orden / referencia</label><input id="ped-ord" placeholder="NHCO-001..."></div>
    </div>
    <div class="g3">
      <div class="fg"><label>Unidades *</label><input type="number" id="ped-u" placeholder="0" oninput="cFl()"></div>
      <div class="fg"><label>Valor mercancía</label><input type="number" id="ped-b" placeholder="0"></div>
      <div class="fg"><label>Valor envío *</label><input type="number" id="ped-e" placeholder="0" oninput="cFl()"></div>
    </div>
    <div class="g2">
      <div class="fg"><label>Flete / unidad</label><input type="number" id="ped-fu" readonly></div>
      <div class="fg"><label>Nota / colección</label><input id="ped-nota" placeholder="Ej: Colección 8"></div>
    </div>
    <div class="brow"><button class="btn btn-lu" onclick="guardarPed()">Agregar pedido</button></div>
  </div>`;
}
function cFl(){const e=+document.getElementById('ped-e')?.value||0,u=+document.getElementById('ped-u')?.value||1;const fu=document.getElementById('ped-fu');if(fu)fu.value=Math.round(e/u);}
function guardarPed(){
  const u=+document.getElementById('ped-u')?.value||0,e=+document.getElementById('ped-e')?.value||0;
  if(!u){toast('Ingresa las unidades',1);return;}
  const p={num:DB.peds.length+1,f:document.getElementById('ped-f')?.value,ord:document.getElementById('ped-ord')?.value||'',uds:u,bruto:+document.getElementById('ped-b')?.value||0,envio:e,flu:Math.round(e/u),total:(+document.getElementById('ped-b')?.value||0)+e};
  DB.peds.push(p);savePedido(p);rPeds();
}

// ── INIT ─────────────────────────────────────────────────────
cargar();
</script>
</body>
</html>
