<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Luz Accesorios — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cr:#FDFAF7;--dk:#2A1C10;--lu:#C4A882;--lu2:#B8956A;--lu3:#F5EDE0;--lu4:#FAF5EE;
  --mid:#8B7355;--warm:#A67C52;--bd:#E8DDD0;--bd2:#C4A882;
  --ok:#4A7C59;--ok2:#E8F5E9;--err:#C0392B;--sh:0 4px 24px rgba(42,28,16,.1);
  --r:10px;--r2:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cr);color:var(--dk);font-family:'Nunito',sans-serif;min-height:100vh}

/* HEADER */
.hdr{background:#fff;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(42,28,16,.08);border-bottom:1px solid var(--bd)}
.hdr-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo img{height:36px;width:auto}.logo img:first-child{filter:none}.logo img:last-child{filter:none}
.cart-btn{background:var(--dk);color:var(--lu);border:none;padding:8px 16px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;letter-spacing:.5px;transition:background .2s}
.cart-btn:hover{background:var(--lu2)}
.cart-count{background:var(--lu);color:var(--dk);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}

/* BANNER */
.banner{position:relative;overflow:hidden;min-height:320px;display:flex;align-items:center;justify-content:center;text-align:center}
.banner-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
.banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.35) 0%,rgba(0,0,0,.55) 100%);display:flex;align-items:center;justify-content:center}
.banner-content{position:relative;z-index:1;padding:40px 24px}
.banner-logo{height:70px;width:auto;margin-bottom:20px;filter:drop-shadow(0 4px 20px rgba(196,168,130,.5))}
.banner-logo-txt{height:50px;width:auto;filter:drop-shadow(0 2px 10px rgba(196,168,130,.3))}
.banner h2{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,3vw,1.3rem);color:var(--lu);font-weight:300;letter-spacing:4px;text-transform:uppercase;margin-top:12px}
.banner-line{width:40px;height:1px;background:var(--lu);margin:14px auto}
.banner p{color:#B8A090;font-size:.85rem;letter-spacing:1.5px}

/* FILTERS */
.filters{background:var(--lu4);border-bottom:1px solid var(--bd);padding:12px 24px;position:sticky;top:64px;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.filters-inner{max-width:1200px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fpill{padding:6px 14px;border:1.5px solid var(--bd);border-radius:20px;background:none;font-family:'Nunito',sans-serif;font-size:11px;font-weight:600;color:var(--mid);cursor:pointer;transition:all .2s;letter-spacing:.5px;white-space:nowrap}
.fpill:hover{background:var(--lu3);border-color:var(--lu2);color:var(--dk)}.fpill.on{background:#8B6F5E;border-color:#8B6F5E;color:#fff}
.search-wrap{margin-left:auto;position:relative}
.search-input{padding:7px 14px 7px 34px;border:1.5px solid var(--bd);border-radius:20px;background:var(--lu4);font-family:'Nunito',sans-serif;font-size:12px;outline:none;width:200px;transition:border-color .2s}
.search-input:focus{border-color:var(--lu2)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mid);font-size:13px;pointer-events:none}

/* GRID */
.main{max-width:1200px;margin:0 auto;padding:28px 24px}
.count{font-size:11px;color:var(--mid);margin-bottom:18px;letter-spacing:.5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}

/* CARD */
.card{background:#fff;border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s,background .2s;position:relative;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(196,168,130,.25);background:#FDFAF7}
.card-select{position:absolute;top:10px;right:10px;z-index:2;width:24px;height:24px;border-radius:50%;border:2px solid #fff;background:rgba(255,255,255,.8);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.card-select.sel{background:var(--ok);border-color:var(--ok);color:#fff}
.card-img{width:100%;aspect-ratio:1;overflow:hidden;cursor:pointer}.card:active{transform:scale(0.98);box-shadow:0 2px 12px rgba(196,168,130,.2)}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.card:hover .card-img img{transform:scale(1.04)}
.card-body{padding:14px}
.card-cat{font-size:9px;color:var(--mid);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:3px}
.card-nom{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--dk);font-weight:600;margin-bottom:2px;line-height:1.3}
.card-cod{font-size:9px;color:var(--bd2);font-family:monospace;margin-bottom:8px}
.card-desc{font-size:10px;color:var(--mid);margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-pv{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--lu2);font-weight:600}
.stock-ok{background:#E8F5E9;color:#2E7D32;font-size:9px;padding:3px 8px;border-radius:10px;font-weight:700}
.stock-bajo{background:#FFF3E0;color:#E65100;font-size:9px;padding:3px 8px;border-radius:10px;font-weight:700}
.btn-add{width:100%;padding:9px;background:var(--lu3);color:var(--dk);border:1.5px solid var(--bd2);border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.btn-add:hover,.btn-add.sel{background:var(--dk);color:var(--lu);border-color:var(--dk)}

/* CARRITO FLOTANTE */
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--dk);color:#fff;padding:14px 24px;z-index:200;display:none;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,.3)}
.cart-bar.show{display:flex}
.cart-bar-info{font-size:13px;color:var(--lu)}
.cart-bar-info span{font-weight:700;font-size:15px}
.btn-wa-bar{background:#25D366;color:#fff;border:none;padding:12px 24px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .2s}
.btn-wa-bar:hover{background:#128C7E}
.btn-clear{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);padding:10px 14px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:11px;cursor:pointer}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.modal{background:#fff;border-radius:var(--r2);max-width:460px;width:100%;max-height:90vh;overflow-y:auto}
.modal-img{width:100%;aspect-ratio:1;object-fit:cover}
.modal-body{padding:20px}
.modal-cat{font-size:10px;color:var(--mid);letter-spacing:2px;text-transform:uppercase;font-weight:600}
.modal-nom{font-family:'Cormorant Garamond',serif;font-size:1.7rem;color:var(--dk);margin:4px 0 2px}
.modal-cod{font-size:10px;color:var(--bd2);font-family:monospace;margin-bottom:12px}
.modal-desc{font-size:12px;color:var(--mid);line-height:1.6;margin-bottom:14px;padding:10px 12px;background:var(--lu4);border-radius:var(--r);border-left:3px solid var(--lu)}
.modal-pv{font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:var(--lu2);font-weight:600;margin-bottom:6px}
.modal-stock{font-size:11px;margin-bottom:16px}
.modal-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn-modal-add{flex:1;padding:12px;background:var(--dk);color:var(--lu);border:none;border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:background .2s}
.btn-modal-close{padding:12px 14px;background:var(--lu4);color:var(--mid);border:none;border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:12px;cursor:pointer}

/* EMPTY & LOADING */
.empty{text-align:center;padding:60px 20px;color:var(--mid);grid-column:1/-1}
.empty-ico{font-size:3rem;margin-bottom:12px}
.loading{text-align:center;padding:80px;color:var(--mid);grid-column:1/-1}
.spinner{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--lu);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.footer{text-align:center;padding:40px 24px 80px;color:var(--mid);font-size:11px;border-top:1px solid var(--bd);margin-top:20px}
.footer a{color:var(--lu2);text-decoration:none}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .search-wrap{margin-left:0;width:100%}
  .search-input{width:100%}
  .banner{min-height:220px;padding:36px 16px}
  .banner-logo{height:55px}
  .banner-logo-txt{height:38px}
  .cart-bar{flex-direction:column;gap:8px}
  .btn-wa-bar,.btn-clear{width:100%;justify-content:center}
}
</style>
</head>

<script>
const SHEET_ID='1MBFGK_OsqGjqC2kVea6vasq0D1Hc-aiXHlt1xT5lnHI';
const API_KEY='AIzaSyCI89kCwt-PUf6UVRmqSLXmtdRpDZGzlfA';
const WA_NUM='573052071061';
var PRODS=[];
var filtCat='';
var CARRITO=[];

function COP(n){return '$'+Math.round(n).toLocaleString('es-CO');}

async function sheetGet(range){
  var url='https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent(range)+'?key='+API_KEY;
  var r=await fetch(url);var d=await r.json();return d.values||[];
}

async function cargar(){
  try{
    var invR=await sheetGet('INVENTARIO!A2:S');
    var refR=await sheetGet('REFERENCIAS!A2:F');
    var imgMap={};
    var noImg=[];
    // Process REFERENCIAS - try multiple column combinations
    refR.forEach(function(r){
      // Try col B(1) as COD, col D(3) as IMG
      var cod=String(r[1]||r[0]||'').trim();
      var img=String(r[3]||r[2]||'').trim();
      var desc=String(r[5]||r[4]||'').trim();
      if(!cod)return;
      function driveThumb(url){
        if(!url)return '';
        url=url.trim();
        // Handle various Google Drive URL formats
        if(url.includes('drive.google.com')||url.includes('docs.google.com')){
          // Format: /d/FILE_ID/ or /d/FILE_ID
          var m=url.match(/\/d\/([a-zA-Z0-9_-]{10,})/);
          if(!m) m=url.match(/id=([a-zA-Z0-9_-]{10,})/);
          if(!m) m=url.match(/\/file\/d\/([a-zA-Z0-9_-]{10,})/);
          if(!m) m=url.match(/open\?id=([a-zA-Z0-9_-]{10,})/);
          if(m)return 'https://lh3.googleusercontent.com/d/'+m[1]+'=w500';
        }
        // If it's already a direct image URL
        if(url.match(/^https?:\/\/.+\.(jpg|jpeg|png|gif|webp|bmp)/i))return url;
        // If it's any http URL, try it
        if(url.startsWith('http'))return url;
        // If it looks like just a Drive file ID (long alphanumeric string)
        if(url.match(/^[a-zA-Z0-9_-]{25,}$/))return 'https://lh3.googleusercontent.com/d/'+url+'=w500';
        return '';
      }
      var thumb=driveThumb(img);
      if(thumb){imgMap[cod]={img:thumb,desc:desc};}
      else{noImg.push({cod:cod,rawUrl:img});}
    });
    console.log('📦 imgMap codes:', Object.keys(imgMap).length, Object.keys(imgMap).slice(0,5));
    console.log('❌ Sin imagen válida:', noImg.slice(0,5));
    PRODS=[];
    invR.forEach(function(r){
      var cod=String(r[1]||'').trim(),nom=String(r[4]||'').trim();
      if(!cod||!nom)return;
      var cat=String(r[3]||'').trim();
      var pv=parseFloat(String(r[11]||'').replace(/[$,. ]/g,'').replace(/,/g,'.'))||0;
      if(!pv)pv=parseFloat(String(r[11]||'').replace(/[$, ]/g,''))||0;
      var sa=parseFloat(String(r[18]||'').replace(/[$, ]/g,''))||0;
      var desc=String(r[15]||'').trim();
      var imgData=imgMap[cod];
      var img=imgData?imgData.img:'';
      var imgDesc=imgData?imgData.desc:'';
      if(sa<=0||!pv||!img)return;
      PRODS.push({cod:cod,nom:nom,cat:cat,pv:pv,sa:Math.round(sa),desc:desc||imgDesc,img:img});
    });
    console.log('✅ Productos con foto y stock:', PRODS.length, PRODS.slice(0,3).map(p=>({cod:p.cod,img:p.img.substring(0,60)})));
    var cats=[...new Set(PRODS.map(function(p){return p.cat;}))].filter(Boolean).sort();
    var pillsEl=document.getElementById('cat-pills');
    var searchWrap=pillsEl.querySelector('.search-wrap');
    cats.forEach(function(c){
      var btn=document.createElement('button');
      btn.className='fpill';btn.textContent=c;
      btn.onclick=function(){setFiltro(c);};
      pillsEl.insertBefore(btn,searchWrap);
    });
    renderCatalogo();
  }catch(e){
    document.getElementById('grid').innerHTML='<div class="empty"><div class="empty-ico">⚠️</div><div>Error cargando productos. Intenta de nuevo.</div></div>';
  }
}

function setFiltro(cat){
  filtCat=cat;
  document.querySelectorAll('.fpill').forEach(function(b){
    b.classList.toggle('on',b.textContent===cat||(cat===''&&b.textContent==='Todas'));
  });
  renderCatalogo();
}

function renderCatalogo(){
  var q=(document.getElementById('buscador')?.value||'').toLowerCase();
  var pp=PRODS.filter(function(p){
    if(filtCat&&p.cat!==filtCat)return false;
    if(q&&!p.nom.toLowerCase().includes(q)&&!p.cod.toLowerCase().includes(q))return false;
    return true;
  });
  document.getElementById('count-txt').textContent=pp.length+' referencias disponibles';
  if(!pp.length){
    document.getElementById('grid').innerHTML='<div class="empty"><div class="empty-ico">💍</div><div>No hay referencias disponibles</div></div>';
    return;
  }
  document.getElementById('grid').innerHTML=pp.map(function(p){
    var enCarrito=CARRITO.find(function(x){return x.cod===p.cod;});
    var stockEl=p.sa>2?'<span class="stock-ok">Disponible</span>':'<span class="stock-bajo">Últimas '+p.sa+'</span>';
    var cod=p.cod;
    return '<div class="card">'+
      '<div class="card-select '+(enCarrito?'sel':'')+'" onclick="toggleCarrito(\''+cod+'\')">'+(enCarrito?'✓':'+')+' </div>'+
      '<div class="card-img" onclick="verDetalle(\''+cod+'\')"><img src="'+p.img+'" alt="'+p.nom+'" loading="lazy" onerror="this.onerror=null;this.parentNode.style.cssText=\'display:flex;align-items:center;justify-content:center;font-size:3rem\';this.parentNode.innerHTML=\'💍\'"></div>'+
      '<div class="card-body">'+
        '<div class="card-cat">'+p.cat+'</div>'+
        '<div class="card-nom">'+p.nom+'</div>'+
        '<div class="card-cod">'+cod+'</div>'+
        (p.desc?'<div class="card-desc">'+p.desc+'</div>':'')+
        '<div class="card-footer"><div class="card-pv">'+COP(p.pv)+'</div>'+stockEl+'</div>'+
        '<button class="btn-add '+(enCarrito?'sel':'')+'" onclick="toggleCarrito(\''+cod+'\')">'+(enCarrito?'✓ Agregado':'+ Agregar al pedido')+'</button>'+
      '</div></div>';
  }).join('');
}

function toggleCarrito(cod){
  var p=PRODS.find(function(x){return x.cod===cod;});
  if(!p)return;
  var idx=CARRITO.findIndex(function(x){return x.cod===cod;});
  if(idx>=0)CARRITO.splice(idx,1);
  else CARRITO.push(p);
  actualizarCarrito();
  renderCatalogo();
}

function actualizarCarrito(){
  var n=CARRITO.length;
  document.getElementById('cart-count').textContent=n;
  document.getElementById('cart-bar').classList.toggle('show',n>0);
  document.getElementById('cart-bar-txt').textContent=n+' referencia'+(n!==1?'s':'')+' seleccionada'+(n!==1?'s':'');
}

function limpiarCarrito(){
  CARRITO=[];actualizarCarrito();renderCatalogo();
}

function pedirWA(){
  if(!CARRITO.length)return;
  var lineas=CARRITO.map(function(p,i){
    return (i+1)+'. *'+p.nom+'*\n   Código: '+p.cod+'\n   Precio: '+COP(p.pv);
  });
  var msg='Hola Luz Accesorios! 💍 Me gustaría pedir:\n\n'+lineas.join('\n\n')+'\n\n¿Están disponibles? 🌸';
  window.open('https://wa.me/'+WA_NUM+'?text='+encodeURIComponent(msg),'_blank');
}

function verCarrito(){
  if(!CARRITO.length){alert('No has seleccionado referencias aún');return;}
  pedirWA();
}

function verDetalle(cod){
  var p=PRODS.find(function(x){return x.cod===cod;});
  if(!p)return;
  var enCarrito=CARRITO.find(function(x){return x.cod===cod;});
  var bg=document.createElement('div');
  bg.className='modal-bg';
  var stockTxt=p.sa>2?'<span class="stock-ok">Disponible</span>':'<span class="stock-bajo">Últimas '+p.sa+' unidades</span>';
  bg.innerHTML='<div class="modal">'+
    '<img class="modal-img" src="'+p.img+'" alt="'+p.nom+'">'+
    '<div class="modal-body">'+
      '<div class="modal-cat">'+p.cat+' · '+p.cod+'</div>'+
      '<div class="modal-nom">'+p.nom+'</div>'+
      (p.desc?'<div class="modal-desc">'+p.desc+'</div>':'')+
      '<div class="modal-pv">'+COP(p.pv)+'</div>'+
      '<div class="modal-stock">'+stockTxt+'</div>'+
      '<div class="modal-btns">'+
        '<button class="btn-modal-close" onclick="this.closest(\'.modal-bg\').remove()">← Volver</button>'+
        '<button class="btn-modal-add" id="modal-add-btn" onclick="toggleCarrito(\''+p.cod+'\');this.closest(\'.modal-bg\').remove()">'+(enCarrito?'✓ Quitar del pedido':'+ Agregar al pedido')+'</button>'+
      '</div>'+
    '</div>'+
  '</div>';
  bg.onclick=function(e){if(e.target===bg)bg.remove();};
  document.body.appendChild(bg);
}

cargar();
</script>
</body>
</html>
